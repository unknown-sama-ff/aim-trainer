  bindSettingsEvents() {
    const sens = document.getElementById('sensitivity');
    if (sens) sens.addEventListener('input', () => {
      document.getElementById('sensVal').textContent = parseFloat(sens.value).toFixed(1);
    });
    ['chThickness', 'chLength', 'chGap', 'chOpacity'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => {
        const valEl = document.getElementById(id.replace('ch', 'ch').replace('Thickness', 'ThickVal').replace('Length', 'LenVal').replace('Gap', 'GapVal').replace('Opacity', 'OpVal'));
        if (valEl) valEl.textContent = el.value;
      });
    });
    const saveBtn = document.getElementById('saveSettingsBtn');
    if (saveBtn) saveBtn.addEventListener('click', () => { UI.saveSettingsFromForm(); UI.showMenu(); });
  },

  saveSettingsFromForm() {
    const s = State.settings;
    const g = (id) => document.getElementById(id);
    if (g('sensitivity')) s.sensitivity = parseFloat(g('sensitivity').value);
    if (g('rawInput')) s.rawInput = g('rawInput').checked;
    if (g('audioEnabled')) s.audioEnabled = g('audioEnabled').checked;
    if (g('screenShake')) s.screenShake = g('screenShake').checked;
    if (g('chType')) {
      s.crosshair.type = g('chType').value;
      s.crosshair.color = g('chColor')?.value || s.crosshair.color;
      s.crosshair.thickness = parseInt(g('chThickness')?.value || s.crosshair.thickness);
      s.crosshair.length = parseInt(g('chLength')?.value || s.crosshair.length);
      s.crosshair.gap = parseInt(g('chGap')?.value || s.crosshair.gap);
      s.crosshair.opacity = parseFloat(g('chOpacity')?.value || s.crosshair.opacity);
      s.crosshair.shootSpread = g('chSpread')?.checked ?? s.crosshair.shootSpread;
    }
    Storage.save();
  },

  /**
   * 从 UI 收集模式参数
   * @param {string} modeId
   * @returns {object}
   */
  collectModeParams(modeId) {
    const g = (id) => document.getElementById(id);
    const num = (id, def) => g(id) ? parseFloat(g(id).value) : def;
    const enable360 = g('mpEnable360')?.checked ?? Storage.getMode360Pref(modeId);
    if (modeId === 'gridShot') return {
      gridSize: 40,
      targetSize: num('mpTargetSize', 22),
      totalTargets: num('mpTotalTargets', 50),
      simultaneousCount: Math.min(12, num('mpSimultaneous', 3)),
      clusterRadius: num('mpClusterRadius', 3),
      spawnInterval: num('mpSpawnInterval', 200),
      timeLimit: 0,
      enable360,
      humanoid: g('mpHumanoid')?.checked ?? false,
    };
    if (modeId === 'tracking') return {
      targetSize: num('mpTargetSize', 50),
      speed: num('mpSpeed', 150),
      pathType: g('mpPathType')?.value || 'circle',
      duration: parseInt(g('mpDuration')?.value || 30),
      enable360,
      humanoid: g('mpHumanoid')?.checked ?? false,
      enableEvasion: g('mpEnableEvasion')?.checked ?? false,
    };
    if (modeId === 'reaction') return {
      targetSize: num('mpTargetSize', 50),
      totalTrials: parseInt(g('mpTotalTrials')?.value || 25),
      prepTimeMin: 1,
      prepTimeMax: 4,
      targetTimeout: 2000,
      enable360,
      humanoid: g('mpHumanoid')?.checked ?? false,
    };
    if (modeId === 'flickShot') return {
      targetSize: num('mpTargetSize', 40),
      totalRounds: parseInt(g('mpTotalRounds')?.value || 10),
      trackDuration: num('mpTrackDuration', 3),
      speed: num('mpSpeed', 200),
      pathType: g('mpPathType')?.value || 'circle',
      enable360,
      humanoid: g('mpHumanoid')?.checked ?? false,
      enableEvasion: g('mpEnableEvasion')?.checked ?? false,
    };
    return {};
  },

  renderHUDElements() {
    const hud = document.createElement('div');
    hud.id = 'hud';
    hud.className = 'hud';
    hud.innerHTML = `
      <div id="hudLeft"></div>
      <div class="hud hud-right" id="hudRight"></div>`;
    document.body.appendChild(hud);
  },

  renderHUD() {
    const session = State.session;
    if (!session) return;
    const left = document.getElementById('hudLeft');
    const right = document.getElementById('hudRight');
    if (!left) return;
    document.getElementById('hud').classList.toggle('hidden', !State.hudVisible);

    const acc = session.hits + session.misses > 0
      ? ((session.hits / (session.hits + session.misses)) * 100).toFixed(1) : '100.0';
    const avgTtc = session.ttcCount > 0 ? (session.ttcSum / session.ttcCount).toFixed(0) : '--';

    if (State.mode === 'tracking') {
      const coverage = session.trackingCoverage != null ? session.trackingCoverage.toFixed(1) : '0.0';
      const avgDist = session.avgDistance != null ? session.avgDistance.toFixed(0) : '--';
      left.innerHTML = `
        ${UI.t('得分', 'Score')}: <span class="val">${session.score}</span><br>
        ${UI.t('追踪覆盖', 'Coverage')}: <span class="val">${coverage}%</span><br>
        ${UI.t('平均偏差', 'Avg Offset')}: <span class="val">${avgDist}px</span><br>
        ${UI.t('连击', 'Streak')}: <span class="val">${session.streak.toFixed(1)}s</span>`;
      right.innerHTML = `
        ${UI.t('剩余时间', 'Time Left')}: <span class="val">${Math.ceil(session.remaining)}s</span><br>
        ${Mode360.enabled() ? `${UI.t('提示', 'Tip')}: <span class="val">${UI.t('鼠标转动360°视角', 'Mouse to look 360°')}</span><br>` : ''}
        ${State.modeParams.humanoid && session.zoneHits ? `${UI.t('部位', 'Zones')}: <span style="color:#ffd700">${UI.t('头', 'H')}${session.zoneHits.head || 0}</span> <span style="color:#fff">${UI.t('身', 'B')}${session.zoneHits.body || 0}</span> <span style="color:#888">${UI.t('肢', 'L')}${session.zoneHits.limb || 0}</span><br>` : ''}
        FPS: <span class="val">${Engine.fps}</span>`;
      return;
    }

    if (State.mode === 'flickShot') {
      const d = GameModes.flickShot.data;
      const holdPct = d?.holdRequired ? ((d.holdTime / d.holdRequired) * 100).toFixed(0) : '0';
      left.innerHTML = `
        ${UI.t('得分', 'Score')}: <span class="val">${session.score}</span><br>
        ${UI.t('跟踪进度', 'Track Progress')}: <span class="val">${holdPct}%</span><br>
        ${UI.t('回合', 'Round')}: <span class="val">${d ? d.current + 1 : 1}/${d ? d.total : '?'}</span><br>
        ${UI.t('连击', 'Streak')}: <span class="val">${session.streak.toFixed(1)}s</span>`;
      right.innerHTML = `
        ${UI.t('剩余', 'Remaining')}: <span class="val">${session.remaining}</span><br>
        ${Mode360.enabled() ? `${UI.t('提示', 'Tip')}: <span class="val">${UI.t('鼠标转动360°视角', 'Mouse to look 360°')}</span><br>` : `${UI.t('提示', 'Tip')}: <span class="val">${UI.t('按住左键跟踪球', 'Hold LMB on ball')}</span><br>`}
        ${State.modeParams.humanoid && session.zoneHits ? `${UI.t('部位', 'Zones')}: <span style="color:#ffd700">${UI.t('头', 'H')}${session.zoneHits.head || 0}</span> <span style="color:#fff">${UI.t('身', 'B')}${session.zoneHits.body || 0}</span> <span style="color:#888">${UI.t('肢', 'L')}${session.zoneHits.limb || 0}</span><br>` : ''}
        FPS: <span class="val">${Engine.fps}</span>`;
      return;
    }

    left.innerHTML = `
      ${UI.t('得分', 'Score')}: <span class="val">${session.score}</span><br>
      ${UI.t('准确度', 'Accuracy')}: <span class="val">${acc}%</span><br>
      ${UI.t('连击', 'Streak')}: <span class="val">${Math.floor(session.streak)}</span><br>
      ${UI.t('平均TTC', 'Avg TTC')}: <span class="val">${avgTtc}ms</span>`;

    const remainLabel = State.mode === 'tracking'
      ? UI.t('剩余时间', 'Time Left')
      : UI.t('剩余', 'Remaining');
    const remainVal = State.mode === 'tracking'
      ? Math.ceil(session.remaining) + 's'
      : session.remaining;

    right.innerHTML = `
      ${remainLabel}: <span class="val">${remainVal}</span><br>
      ${UI.t('命中', 'Hits')}: <span class="val">${session.hits}</span>
      ${UI.t('失误', 'Miss')}: <span class="warn">${session.misses}</span><br>
      ${Mode360.enabled() ? `${UI.t('提示', 'Tip')}: <span class="val">${UI.t('鼠标转动360°视角', 'Mouse to look 360°')}</span><br>` : ''}
      ${State.modeParams.humanoid && session.zoneHits ? `${UI.t('部位', 'Zones')}: <span style="color:#ffd700">${UI.t('头', 'H')}${session.zoneHits.head || 0}</span> <span style="color:#fff">${UI.t('身', 'B')}${session.zoneHits.body || 0}</span> <span style="color:#888">${UI.t('肢', 'L')}${session.zoneHits.limb || 0}</span><br>` : ''}
      FPS: <span class="val">${Engine.fps}</span>`;
  },

  renderCountdown() {
    let el = document.getElementById('countdown');
    if (!el) {
      el = document.createElement('div');
      el.id = 'countdown';
      el.className = 'countdown-overlay';
      document.body.appendChild(el);
    }
    el.textContent = State.countdownValue > 0 ? State.countdownValue : UI.t('开始!', 'GO!');
    el.style.opacity = State.countdownTimer < 0.3 ? State.countdownTimer / 0.3 : 1;
    if (State.phase !== GAME_STATE.COUNTDOWN) el.remove();
  },

        <div style="text-align:center;font-size:1.4rem;color:#00ff88;margin-bottom:8px">${s.score.toLocaleString()} ${UI.t('分', 'pts')}</div>
        <div class="stat-grid">
          <div class="stat-item"><div class="label">${UI.t('准确度', 'Accuracy')}</div><div class="value">${s.accuracy.toFixed(1)}%</div></div>
          <div class="stat-item"><div class="label">${UI.t('平均TTC', 'Avg TTC')}</div><div class="value">${s.avgTtc ? s.avgTtc.toFixed(0) + 'ms' : '--'}</div></div>
          <div class="stat-item"><div class="label">${UI.t('失误', 'Misses')}</div><div class="value">${s.misses}</div></div>
          <div class="stat-item"><div class="label">${UI.t('最大连击', 'Max Streak')}</div><div class="value">${s.maxStreak}</div></div>
          ${s.avgReaction ? `<div class="stat-item"><div class="label">${UI.t('平均反应', 'Avg Reaction')}</div><div class="value">${s.avgReaction.toFixed(0)}ms</div></div>` : ''}
          ${s.trackingCoverage !== undefined ? `<div class="stat-item"><div class="label">${UI.t('追踪覆盖', 'Coverage')}</div><div class="value">${s.trackingCoverage.toFixed(1)}%</div></div>` : ''}
          ${s.ttcStd ? `<div class="stat-item"><div class="label">${UI.t('一致性σ', 'Consistency σ')}</div><div class="value">${s.ttcStd.toFixed(0)}ms</div></div>` : ''}
          ${s.reactionStd ? `<div class="stat-item"><div class="label">${UI.t('反应σ', 'Reaction σ')}</div><div class="value">${s.reactionStd.toFixed(0)}ms</div></div>` : ''}
          ${s.zoneHits ? `<div class="stat-item"><div class="label">${UI.t('部位命中', 'Zone Hits')}</div><div class="value"><span style="color:#ffd700">${UI.t('头', 'H')}:${s.zoneHits.head||0}</span> <span style="color:#fff">${UI.t('身', 'B')}:${s.zoneHits.body||0}</span> <span style="color:#aaa">${UI.t('肢', 'L')}:${s.zoneHits.limb||0}</span></div></div>` : ''}
        </div>
        <canvas id="trendChart"></canvas>
        <div class="btn-row">
          <button class="action-btn" id="retryBtn">${UI.t('再来一次 (R)', 'Retry (R)')}</button>
          <button class="back-btn" id="menuBtn">${UI.t('返回菜单', 'Menu')}</button>
        </div>
        <button class="action-btn" id="exportBtn" style="width:100%;margin-top:8px;font-size:.75rem">${UI.t('导出成绩 JSON', 'Export JSON')}</button>
      </div>`;

    UI.drawTrendChart(history);
    document.getElementById('retryBtn').addEventListener('click', () => Engine.restart());
    document.getElementById('menuBtn').addEventListener('click', () => Engine.returnToMenu());
    document.getElementById('exportBtn').addEventListener('click', () => UI.exportResults(s));
  },

  /**
   * 绘制最近10次成绩折线图
   * @param {Array} history
   */
  drawTrendChart(history) {
    const canvas = document.getElementById('trendChart');
    if (!canvas || history.length === 0) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const pad = 24;
    const data = history.slice(0, 10).reverse();
    const scores = data.map(d => d.score);
    const min = Math.min(...scores) * 0.9;
    const max = Math.max(...scores) * 1.1;

    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.moveTo(pad, h - pad);
    ctx.lineTo(w - pad, h - pad);
    ctx.stroke();

    if (data.length < 2) {
      ctx.fillStyle = '#666';
      ctx.font = '11px Consolas';
      ctx.textAlign = 'center';
      ctx.fillText(UI.t('需要更多数据', 'Need more data'), w / 2, h / 2);
      return;
    }

    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = pad + (i / (data.length - 1)) * (w - pad * 2);
      const y = h - pad - ((d.score - min) / (max - min)) * (h - pad * 2);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    ctx.fillStyle = '#00ff88';
    data.forEach((d, i) => {
      const x = pad + (i / (data.length - 1)) * (w - pad * 2);
      const y = h - pad - ((d.score - min) / (max - min)) * (h - pad * 2);
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.fillStyle = '#666';
    ctx.font = '10px Consolas';
    ctx.textAlign = 'left';
    ctx.fillText(UI.t('最近成绩趋势', 'Recent scores'), pad, 14);
  },

  /**
   * @param {object} session
   */
  exportResults(session) {
    const blob = new Blob([JSON.stringify(session, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `aim-trainer-${session.mode}-${Date.now()}.json`;
    a.click();
  },

  showPause() {
    UI.overlay.classList.add('interactive');
    UI.overlay.innerHTML = `
      <div class="pause-overlay">
        <div class="pause-panel panel">
          <h2>${UI.t('已暂停', 'PAUSED')}</h2>
          <p>${UI.t('按 ESC 继续', 'Press ESC to resume')}</p>
          <p>${UI.t('点击此处继续', 'Click to resume')}</p>
          <button class="action-btn" id="quitBtn" style="margin-top:16px">${UI.t('退出训练', 'Quit')}</button>
        </div>
      </div>`;
    document.getElementById('quitBtn').addEventListener('click', () => Engine.returnToMenu());
    UI.overlay.querySelector('.pause-overlay').addEventListener('click', (e) => {
      if (e.target.id === 'quitBtn') return;
      if (e.target.classList.contains('pause-overlay') || e.target.closest('.pause-panel')) {
        Engine.resume();
      }
    });
  },

  hidePause() {
    UI.overlay.innerHTML = '';
    UI.overlay.classList.remove('interactive');
  },
};

// ─── Engine 扩展：暂停/ESC/R ─────────────────────────────────────────────────
Engine.handleEscape = function () {
  if (State.phase === GAME_STATE.PLAYING) {
    State.phase = GAME_STATE.PAUSED;
    Input.unlockPointer();
    UI.showPause();
  } else if (State.phase === GAME_STATE.PAUSED) {
    Engine.resume();
  } else if (State.phase === GAME_STATE.RESULTS) {
    Engine.returnToMenu();
  }
};

Engine.resume = function () {
  State.phase = GAME_STATE.PLAYING;
  UI.hidePause();
  Input.skipCameraMoves = 3;
  Renderer.canvas.focus();
  Input.lockPointer();
};

Engine.handleRestart = function () {
  if (State.phase === GAME_STATE.PLAYING || State.phase === GAME_STATE.RESULTS || State.phase === GAME_STATE.PAUSED) {
    Engine.restart();
  }
};

// ─── 启动 ─────────────────────────────────────────────────────────────────────
(function bootstrap() {
  const data = Storage.load();
  State.settings = data.settings || Storage.defaultSettings();
  UI.init();
  Engine.init(document.getElementById('gameCanvas'));
})();
</script>
