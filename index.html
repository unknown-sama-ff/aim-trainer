<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Trainer — FPS 瞄准训练</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;color:#e0e0e0;font-family:Consolas,Monaco,'Courier New',monospace;user-select:none;-webkit-user-select:none}
#gameCanvas{display:block;width:100vw;height:100vh;cursor:none}
#uiOverlay{position:fixed;inset:0;pointer-events:none;z-index:10}
#uiOverlay.interactive{pointer-events:auto}
.panel{position:absolute;background:rgba(10,10,15,.92);border:1px solid rgba(0,255,136,.25);border-radius:8px;padding:24px;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,.6)}
.panel h1{font-size:1.6rem;color:#00ff88;margin-bottom:4px;letter-spacing:2px}
.panel h2{font-size:.85rem;color:#888;margin-bottom:20px;font-weight:normal}
.menu-center{top:50%;left:50%;transform:translate(-50%,-50%);min-width:420px;max-width:90vw;max-height:90vh;overflow-y:auto}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mode-btn,.action-btn,.back-btn{padding:14px 16px;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);border-radius:6px;color:#e0e0e0;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .15s;text-align:left}
.mode-btn:hover,.action-btn:hover,.back-btn:hover{background:rgba(0,255,136,.18);border-color:#00ff88}
.mode-btn.selected{background:rgba(0,255,136,.22);border-color:#00ff88;color:#00ff88}
.mode-btn .desc{display:block;font-size:.7rem;color:#666;margin-top:4px}
.settings-group{margin-bottom:14px}
.settings-group label{display:block;font-size:.75rem;color:#888;margin-bottom:4px}
.settings-group input[type=range]{width:100%;accent-color:#00ff88}
.settings-group select,.settings-group input[type=color],.settings-group input[type=number]{width:100%;padding:6px 8px;background:#151520;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-family:inherit;font-size:.8rem}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:.8rem;color:#aaa;margin:6px 0}
.checkbox-row input{accent-color:#00ff88}
.hud{position:fixed;top:16px;left:16px;pointer-events:none;font-size:.8rem;line-height:1.7;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.hud.hidden{display:none}
.hud .val{color:#00ff88}
.hud .warn{color:#ff4444}
.hud-right{left:auto;right:16px;text-align:right}
.countdown-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:8rem;color:#00ff88;text-shadow:0 0 40px rgba(0,255,136,.5);pointer-events:none;z-index:20}
.pause-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:15;pointer-events:auto}
.pause-panel{text-align:center}
.pause-panel h2{font-size:2rem;color:#00ff88;margin-bottom:16px}
.pause-panel p{color:#888;font-size:.85rem;margin-bottom:8px}
.results-panel{min-width:480px;max-width:560px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat-item{background:rgba(255,255,255,.04);padding:10px;border-radius:4px}
.stat-item .label{font-size:.7rem;color:#666}
.stat-item .value{font-size:1.1rem;color:#00ff88;margin-top:2px}
.grade{font-size:3rem;font-weight:bold;text-align:center;margin:8px 0}
.grade-S{color:#ffd700}.grade-A{color:#00ff88}.grade-B{color:#44aaff}.grade-C{color:#ffaa44}.grade-D{color:#ff4444}
#trendChart{width:100%;height:120px;margin-top:12px;background:rgba(0,0,0,.3);border-radius:4px}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row button{flex:1;padding:12px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px;background:rgba(255,255,255,.05);border:1px solid #333;border-radius:4px;color:#888;cursor:pointer;font-family:inherit;font-size:.75rem}
.tab-btn.active{background:rgba(0,255,136,.15);border-color:#00ff88;color:#00ff88}
.tab-content{display:none}.tab-content.active{display:block}
.lang-toggle{position:fixed;bottom:12px;right:12px;z-index:30;padding:6px 12px;background:rgba(10,10,15,.8);border:1px solid #333;border-radius:4px;color:#888;cursor:pointer;font-family:inherit;font-size:.75rem;pointer-events:auto}
.lang-toggle:hover{border-color:#00ff88;color:#00ff88}
.shake{animation:shake .15s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}75%{transform:translate(3px,-2px)}}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<button class="lang-toggle" id="langToggle">EN</button>
<div id="uiOverlay" class="interactive"></div>
<script>
'use strict';

/* ==========================================================================
   Aim Trainer — 单文件 FPS 瞄准训练系统
   模块: Engine | Renderer | Input | Audio | GameModes | Storage | UI | Stats
   ========================================================================== */

// ─── 常量 ───────────────────────────────────────────────────────────────────
const GAME_STATE = { MENU: 'MENU', COUNTDOWN: 'COUNTDOWN', PLAYING: 'PLAYING', PAUSED: 'PAUSED', RESULTS: 'RESULTS' };
const STORAGE_KEY = 'aimTrainer_v1';
const MAX_HISTORY = 50;
const TARGET_COLOR = '#00ff88';
const HIT_COLOR = '#ffffff';
const MISS_FLASH = '#ff4444';

// ─── 全局状态 ───────────────────────────────────────────────────────────────
const State = {
  phase: GAME_STATE.MENU,
  mode: 'gridShot',
  lang: 'zh',
  settings: null,
  modeParams: null,
  session: null,
  countdownValue: 3,
  countdownTimer: 0,
  hudVisible: true,
  menuTab: 'modes',
  selectedModeIndex: 0,
  shakeTimer: 0,
  lastFrameTime: 0,
  accumulator: 0,
  fixedDt: 1 / 144,
  tabHiddenAt: 0,
};

// ─── Engine: 游戏循环与时间管理 ─────────────────────────────────────────────
const Engine = {
  /** @type {number} */
  fps: 0,
  /** @type {number} */
  frameCount: 0,
  /** @type {number} */
  fpsTimer: 0,

  /**
   * 初始化引擎，绑定 rAF 循环
   * @param {HTMLCanvasElement} canvas
   */
  init(canvas) {
    Renderer.init(canvas);
    Input.init(canvas);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) State.tabHiddenAt = performance.now();
      else if (State.tabHiddenAt) {
        const gap = performance.now() - State.tabHiddenAt;
        State.accumulator = Math.min(State.accumulator + gap / 1000, 0.2);
        State.tabHiddenAt = 0;
      }
    });
    State.lastFrameTime = performance.now();
    requestAnimationFrame(Engine.loop);
  },

  /**
   * 主循环 — 固定时间步长更新 + 可变渲染
   * @param {number} now
   */
  loop(now) {
    let dt = (now - State.lastFrameTime) / 1000;
    State.lastFrameTime = now;
    if (dt > 0.1) dt = 0.1;

    Engine.frameCount++;
    Engine.fpsTimer += dt;
    if (Engine.fpsTimer >= 1) {
      Engine.fps = Engine.frameCount;
      Engine.frameCount = 0;
      Engine.fpsTimer = 0;
    }

    State.accumulator += dt;
    while (State.accumulator >= State.fixedDt) {
      Engine.update(State.fixedDt);
      State.accumulator -= State.fixedDt;
    }

    if (State.shakeTimer > 0) State.shakeTimer -= dt;

    Renderer.clear();
    Engine.render();
    Input.poll();
    requestAnimationFrame(Engine.loop);
  },

  /**
   * 逻辑更新（固定步长）
   * @param {number} dt - 秒
   */
  update(dt) {
    switch (State.phase) {
      case GAME_STATE.COUNTDOWN:
        State.countdownTimer -= dt;
        if (State.countdownTimer <= 0) {
          State.countdownValue--;
          if (State.countdownValue <= 0) {
            State.phase = GAME_STATE.PLAYING;
            Input.rawX = Renderer.width / 2;
            Input.rawY = Renderer.height / 2;
            Input.crosshairX = Input.rawX;
            Input.crosshairY = Input.rawY;
            Input.lockPointer();
            const mode = GameModes[State.mode];
            if (mode && mode.onStart) mode.onStart();
          } else {
            State.countdownTimer = 1;
            Audio.playTick();
          }
        }
        break;
      case GAME_STATE.PLAYING: {
        const mode = GameModes[State.mode];
        if (mode && mode.update) mode.update(dt);
        break;
      }
    }
  },

  /** 渲染当前阶段 */
  render() {
    if (State.phase === GAME_STATE.PLAYING || State.phase === GAME_STATE.PAUSED) {
      const mode = GameModes[State.mode];
      if (mode && mode.render) mode.render();
      Renderer.drawCrosshair(Input.crosshairX, Input.crosshairY);
      if (State.hudVisible) UI.renderHUD();
    }
    if (State.phase === GAME_STATE.COUNTDOWN) {
      UI.renderCountdown();
    }
  },

  /**
   * 开始训练流程
   * @param {string} modeId
   */
  startTraining(modeId) {
    State.mode = modeId;
    // 清理其他模式残留数据，避免串模式
    Object.keys(GameModes).forEach((key) => {
      if (GameModes[key].data !== undefined) GameModes[key].data = null;
    });
    State.modeParams = { ...Storage.getDefaultModeParams(modeId), ...UI.collectModeParams(modeId) };
    Storage.saveMode360Pref(modeId, !!State.modeParams.enable360);
    Input.setCameraMode(!!State.modeParams.enable360);
    State.session = Stats.createSession(modeId, State.modeParams);
    State.phase = GAME_STATE.COUNTDOWN;
    State.countdownValue = 3;
    State.countdownTimer = 0.5;
    UI.hideMenu();
    Input.lockPointer();
    Audio.playTick();
  },

  /** 结束训练并进入结算 */
  endTraining() {
    Input.unlockPointer();
    Stats.finalizeSession(State.session);
    Storage.saveSession(State.session);
    Storage.updateHighScore(State.mode, State.session.score);
    State.phase = GAME_STATE.RESULTS;
    UI.showResults();
  },

  /** 返回主菜单 */
  returnToMenu() {
    Input.unlockPointer();
    Input.setCameraMode(false);
    State.phase = GAME_STATE.MENU;
    State.session = null;
    UI.showMenu();
  },

  /** 快速重新开始 */
  restart() {
    if (State.mode) Engine.startTraining(State.mode);
  },
};

// ─── Renderer: Canvas 绘制与 DPI ────────────────────────────────────────────
const Renderer = {
  /** @type {CanvasRenderingContext2D} */
  ctx: null,
  width: 0,
  height: 0,
  dpr: 1,

  /**
   * 初始化渲染器
   * @param {HTMLCanvasElement} canvas
   */
  init(canvas) {
    Renderer.canvas = canvas;
    Renderer.ctx = canvas.getContext('2d', { alpha: false });
    window.addEventListener('resize', Renderer.resize);
    Renderer.resize();
  },

  /** 响应窗口尺寸与 DPI 变化 */
  resize() {
    const canvas = Renderer.canvas;
    Renderer.dpr = window.devicePixelRatio || 1;
    Renderer.width = window.innerWidth;
    Renderer.height = window.innerHeight;
    canvas.width = Renderer.width * Renderer.dpr;
    canvas.height = Renderer.height * Renderer.dpr;
    canvas.style.width = Renderer.width + 'px';
    canvas.style.height = Renderer.height + 'px';
    Renderer.ctx.setTransform(Renderer.dpr, 0, 0, Renderer.dpr, 0, 0);
  },

  /** 清空画布 */
  clear() {
    const { ctx, width, height } = Renderer;
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, width, height);
  },

  /**
   * 绘制圆形目标（含弹出/淡出动画）
   * @param {number} x
   * @param {number} y
   * @param {number} radius
   * @param {number} [alpha=1]
   * @param {number} [scale=1]
   * @param {string} [color]
   */
  drawTarget(x, y, radius, alpha = 1, scale = 1, color = TARGET_COLOR) {
    const { ctx } = Renderer;
    const r = radius * scale;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  },

  /**
   * 绘制击中粒子效果
   * @param {Array<{x:number,y:number,vx:number,vy:number,life:number}>} particles
   */
  drawParticles(particles) {
    const { ctx } = Renderer;
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = HIT_COLOR;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  },

  /**
   * 绘制准星 — 支持十字/点/圆环，带反色描边确保可见性
   * @param {number} x
   * @param {number} y
   */
  drawCrosshair(x, y) {
    const s = State.settings.crosshair;
    const { ctx } = Renderer;
    const spread = s.shootSpread && Input.shootAnim > 0 ? Input.shootAnim * 4 : 0;
    const len = s.length + spread;
    const gap = s.gap + spread * 0.5;

    ctx.save();
    ctx.globalAlpha = s.opacity;
    ctx.strokeStyle = s.color;
    ctx.fillStyle = s.color;
    ctx.lineWidth = s.thickness;
    ctx.lineCap = 'round';

    // 反色描边：在深色背景上增强对比
    const outline = (fn) => {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = s.thickness + 2;
      fn();
      ctx.restore();
      fn();
    };

    if (s.type === 'dot') {
      outline(() => { ctx.beginPath(); ctx.arc(x, y, s.length, 0, Math.PI * 2); ctx.fill(); });
    } else if (s.type === 'circle') {
      outline(() => { ctx.beginPath(); ctx.arc(x, y, s.length, 0, Math.PI * 2); ctx.stroke(); });
    } else {
      // cross
      const drawLines = () => {
        ctx.beginPath();
        ctx.moveTo(x - len - gap, y); ctx.lineTo(x - gap, y);
        ctx.moveTo(x + gap, y); ctx.lineTo(x + len + gap, y);
        ctx.moveTo(x, y - len - gap); ctx.lineTo(x, y - gap);
        ctx.moveTo(x, y + gap); ctx.lineTo(x, y + len + gap);
        ctx.stroke();
      };
      outline(drawLines);
    }
    ctx.restore();
  },

  /**
   * 屏幕震动偏移
   * @returns {{x:number,y:number}}
   */
  getShakeOffset() {
    if (State.shakeTimer <= 0) return { x: 0, y: 0 };
    const m = State.shakeTimer * 30;
    return { x: (Math.random() - 0.5) * m, y: (Math.random() - 0.5) * m };
  },
};

// ─── World3D: 360° 视角投影与全景背景 ───────────────────────────────────────
const World3D = {
  FOV_H: 2.35,
  FOV_V: 1.45,
  /** @type {Array<{yaw:number,pitch:number,size:number,brightness:number}>} */
  stars: [],

  /** 初始化星空背景点 */
  initStars() {
    if (World3D.stars.length) return;
    for (let i = 0; i < 160; i++) {
      World3D.stars.push({
        yaw: (Math.random() - 0.5) * Math.PI * 2,
        pitch: (Math.random() - 0.5) * 1.6,
        size: Math.random() > 0.85 ? 2 : 1,
        brightness: 0.15 + Math.random() * 0.55,
      });
    }
  },

  /**
   * 角度归一化到 [-π, π]
   * @param {number} a
   * @returns {number}
   */
  normalizeAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  },

  /**
   * 两目标之间的角距离
   * @param {number} y1
   * @param {number} p1
   * @param {number} y2
   * @param {number} p2
   */
  angularDistance(y1, p1, y2, p2) {
    return Math.hypot(World3D.normalizeAngle(y1 - y2), p1 - p2);
  },

  /**
   * 将球面坐标投影到屏幕（背景与目标共用同一公式）
   * 约定：pitch>0 为天空（屏幕上方向），cameraPitch>0 为抬头
   * @param {number} tYaw - 目标水平角
   * @param {number} tPitch - 目标垂直角
   * @param {number} cYaw - 相机水平角
   * @param {number} cPitch - 相机垂直角
   * @returns {{x:number,y:number,visible:boolean,relYaw:number,relPitch:number}}
   */
  project(tYaw, tPitch, cYaw, cPitch) {
    const w = Renderer.width;
    const h = Renderer.height;
    const relYaw = World3D.normalizeAngle(tYaw - cYaw);
    const relPitch = tPitch - cPitch;
    const x = w / 2 + (relYaw / World3D.FOV_H) * w;
    const y = h / 2 - (relPitch / World3D.FOV_V) * h;
    const visible = Math.abs(relYaw) < World3D.FOV_H * 0.55 && Math.abs(relPitch) < World3D.FOV_V * 0.55;
    return { x, y, visible, relYaw, relPitch };
  },

  /**
   * 绘制 360° 训练场景背景（全部元素走 project，与目标小球同一套 Y 轴）
   * @param {number} camYaw
   * @param {number} camPitch
   * @param {number} time
   */
  renderPanorama(camYaw, camPitch, time) {
    World3D.initStars();
    const { ctx, width: w, height: h } = Renderer;
    const P = (yaw, pitch) => World3D.project(yaw, pitch, camYaw, camPitch);

    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#060812');
    sky.addColorStop(0.45, '#0a0a14');
    sky.addColorStop(1, '#14101a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    const horizon = P(0, 0);

    for (let i = -14; i <= 14; i++) {
      const worldYaw = i * 0.42;
      const topPitch = 0.1 + Math.abs(i % 5) * 0.05;
      const top = P(worldYaw, topPitch);
      const base = P(worldYaw, 0);
      if (base.x < -80 || base.x > w + 80) continue;
      const bh = Math.max(8, base.y - top.y);
      ctx.fillStyle = `rgba(${30 + (i % 3) * 15},${40 + (i % 4) * 10},${55 + (i % 5) * 8},0.35)`;
      ctx.fillRect(base.x - 18, top.y, 36, bh);
    }

    for (let i = -18; i <= 18; i++) {
      const worldYaw = i * 0.28;
      const top = P(worldYaw, 0);
      const bottom = P(worldYaw, -0.82);
      if (top.x < -20 && bottom.x < -20) continue;
      if (top.x > w + 20 && bottom.x > w + 20) continue;
      const rel = World3D.normalizeAngle(worldYaw - camYaw);
      const alpha = Math.max(0.03, 0.14 - Math.abs(rel) * 0.06);
      ctx.strokeStyle = `rgba(0,255,136,${alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(top.x, top.y);
      ctx.lineTo(bottom.x, bottom.y);
      ctx.stroke();
    }

    for (let j = 1; j <= 10; j++) {
      const pitch = -0.07 * j;
      const gy = P(0, pitch).y;
      if (gy < 0 || gy > h) continue;
      ctx.strokeStyle = `rgba(0,255,136,${0.07 * (1 - j / 10)})`;
      ctx.beginPath();
      ctx.moveTo(w * 0.05, gy);
      ctx.lineTo(w * 0.95, gy);
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(0,255,136,0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, horizon.y);
    ctx.lineTo(w, horizon.y);
    ctx.stroke();

    for (const star of World3D.stars) {
      const sp = P(star.yaw, star.pitch);
      if (sp.x < 0 || sp.x > w || sp.y < 0 || sp.y > h) continue;
      ctx.fillStyle = `rgba(220,230,255,${star.brightness})`;
      ctx.fillRect(sp.x, sp.y, star.size, star.size);
    }

    ctx.font = '11px Consolas, monospace';
    ctx.fillStyle = 'rgba(0,255,136,0.35)';
    ctx.textAlign = 'center';
    const dirs = [
      { label: 'N', yaw: 0 }, { label: 'E', yaw: Math.PI / 2 },
      { label: 'S', yaw: Math.PI }, { label: 'W', yaw: -Math.PI / 2 },
    ];
    for (const d of dirs) {
      const rel = World3D.normalizeAngle(d.yaw - camYaw);
      if (Math.abs(rel) >= World3D.FOV_H * 0.48) continue;
      const dp = P(d.yaw, 0.52);
      ctx.fillText(d.label, dp.x, dp.y);
    }

    const yawDeg = Math.round((camYaw * 180) / Math.PI);
    ctx.fillStyle = 'rgba(136,136,136,0.5)';
    ctx.textAlign = 'left';
    ctx.fillText(`YAW ${yawDeg}°`, 12, h - 12);
  },
};

// ─── Mode360: 四模式共用的 360° 辅助 ────────────────────────────────────────
const Mode360 = {
  /** @returns {boolean} */
  enabled() { return Input.useCamera; },

  /**
   * 网格格转世界角
   * @param {number} col
   * @param {number} row
   * @param {number} cols
   * @param {number} rows
   */
  cellToWorld(col, row, cols, rows) {
    const u = (col + 0.5) / cols - 0.5;
    const v = (row + 0.5) / rows - 0.5;
    return {
      yaw: u * World3D.FOV_H * 0.88,
      pitch: -v * World3D.FOV_V * 0.62,
    };
  },

  /** @returns {{yaw:number,pitch:number}} */
  randomWorld() {
    return {
      yaw: (Math.random() - 0.5) * World3D.FOV_H * 0.82,
      pitch: (Math.random() - 0.5) * World3D.FOV_V * 0.52,
    };
  },

  /**
   * @param {number} yaw
   * @param {number} pitch
   */
  project(yaw, pitch) {
    return World3D.project(yaw, pitch, Input.cameraYaw, Input.cameraPitch);
  },

  /** @param {number} [time] */
  drawBackground(time) {
    World3D.renderPanorama(Input.cameraYaw, Input.cameraPitch, time || 0);
  },

  /**
   * 绘制视野外目标指示箭头
   * @param {{x:number,y:number,visible:boolean}} proj
   */
  drawOffscreenIndicator(proj) {
    if (proj.visible) return;
    const { ctx } = Renderer;
    const cx = Renderer.width / 2;
    const cy = Renderer.height / 2;
    const angle = Math.atan2(proj.y - cy, proj.x - cx);
    const ex = cx + Math.cos(angle) * (Renderer.width / 2 - 30);
    const ey = cy + Math.sin(angle) * (Renderer.height / 2 - 30);
    ctx.save();
    ctx.fillStyle = 'rgba(0,255,136,0.6)';
    ctx.beginPath();
    ctx.moveTo(ex + Math.cos(angle) * 12, ey + Math.sin(angle) * 12);
    ctx.lineTo(ex + Math.cos(angle + 2.5) * 8, ey + Math.sin(angle + 2.5) * 8);
    ctx.lineTo(ex + Math.cos(angle - 2.5) * 8, ey + Math.sin(angle - 2.5) * 8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  },
};

// ─── Input: 鼠标/键盘输入 ───────────────────────────────────────────────────
const Input = {
  crosshairX: 0,
  crosshairY: 0,
  rawX: 0,
  rawY: 0,
  mouseDown: false,
  justClicked: false,
  frameClickPending: false,
  justReleased: false,
  shootAnim: 0,
  pointerLocked: false,
  /** 360° 相机模式（追踪/扫射） */
  useCamera: false,
  cameraYaw: 0,
  cameraPitch: 0,
  /** 恢复 Pointer Lock 后跳过若干帧鼠标增量，避免 ESC 后轴向异常 */
  skipCameraMoves: 0,
  /** @type {Set<string>} */
  keys: new Set(),
  /** @type {Set<string>} */
  keysJustPressed: new Set(),

  /**
   * @param {HTMLCanvasElement} canvas
   */
  init(canvas) {
    Input.crosshairX = window.innerWidth / 2;
    Input.crosshairY = window.innerHeight / 2;
    Input.rawX = Input.crosshairX;
    Input.rawY = Input.crosshairY;

    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        Input.mouseDown = true;
        // 扫射转移为按住跟踪，不在按下时触发射击判定
        if (State.phase === GAME_STATE.PLAYING && State.mode !== 'flickShot') {
          Input.justClicked = true;
          Input.frameClickPending = true;
          Input.shootAnim = 1;
        }
      }
    });
    canvas.addEventListener('mouseup', (e) => {
      if (e.button === 0) Input.justReleased = true;
      Input.mouseDown = false;
    });
    canvas.addEventListener('click', () => {
      if (State.phase === GAME_STATE.PLAYING && Input.useCamera && !Input.pointerLocked) {
        Input.lockPointer();
      }
    });

    document.addEventListener('mousemove', (e) => {
      const sens = State.settings.sensitivity;
      if (State.phase === GAME_STATE.PAUSED) return;

      // 360° 追踪：仅 Pointer Lock 有效时处理，避免 ESC 后 client 坐标干扰导致 Y 轴翻转
      if (Input.useCamera) {
        if (State.phase !== GAME_STATE.PLAYING) return;
        if (!Input.pointerLocked || document.pointerLockElement !== canvas) return;
        if (Input.skipCameraMoves > 0) {
          Input.skipCameraMoves--;
          return;
        }
        const rate = sens * 0.003;
        Input.cameraYaw += e.movementX * rate;
        // pitch>0 = 抬头；与 World3D.project 约定一致（鼠标上移 → 视角上抬）
        Input.cameraPitch = Math.max(-1.35, Math.min(1.35, Input.cameraPitch - e.movementY * rate));
        Input.crosshairX = Renderer.width / 2;
        Input.crosshairY = Renderer.height / 2;
        return;
      }

      if (Input.pointerLocked && document.pointerLockElement === canvas) {
        const mx = e.movementX * sens;
        const my = e.movementY * sens;
        Input.rawX = Math.max(0, Math.min(Renderer.width, Input.rawX + mx));
        Input.rawY = Math.max(0, Math.min(Renderer.height, Input.rawY + my));
        Input.crosshairX = Input.rawX;
        Input.crosshairY = Input.rawY;
      } else if (State.phase === GAME_STATE.PLAYING) {
        // pointer lock lost mid-game — ignore to prevent crosshair teleport
      } else if (State.phase !== GAME_STATE.PLAYING) {
        Input.rawX = e.clientX;
        Input.rawY = e.clientY;
        Input.crosshairX = Input.rawX;
        Input.crosshairY = Input.rawY;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (!Input.keys.has(e.code)) Input.keysJustPressed.add(e.code);
      Input.keys.add(e.code);
      if (e.code === 'Escape') Engine.handleEscape();
      if (e.code === 'KeyR') Engine.handleRestart();
      if (e.code === 'Tab') { e.preventDefault(); State.hudVisible = !State.hudVisible; }
    });
    document.addEventListener('keyup', (e) => Input.keys.delete(e.code));

    document.addEventListener('pointerlockchange', () => {
      Input.pointerLocked = document.pointerLockElement === canvas;
      if (Input.pointerLocked) {
        Input.skipCameraMoves = 2;
        if (Input.useCamera) {
          Input.crosshairX = Renderer.width / 2;
          Input.crosshairY = Renderer.height / 2;
        } else {
          Input.rawX = Renderer.width / 2;
          Input.rawY = Renderer.height / 2;
          Input.crosshairX = Input.rawX;
          Input.crosshairY = Input.rawY;
        }
      } else if (State.phase === GAME_STATE.PLAYING) {
        State.phase = GAME_STATE.PAUSED;
        UI.showPause();
      }
    });
  },

  /** 每帧末尾清除瞬时输入标志 */
  poll() {
    if (!Input.frameClickPending) Input.justClicked = false;
    Input.frameClickPending = false;
    Input.justReleased = false;
    Input.keysJustPressed.clear();
    if (Input.shootAnim > 0) Input.shootAnim = Math.max(0, Input.shootAnim - 0.08);
  },

  /** 注册一次射击（每帧只消费一次） */
  consumeClick() {
    if (!Input.justClicked) return false;
    Input.justClicked = false;
    Input.frameClickPending = false;
    return true;
  },

  lockPointer() {
    if (State.settings.rawInput || Input.useCamera) Renderer.canvas.requestPointerLock?.();
  },

  unlockPointer() {
    document.exitPointerLock?.();
  },

  /** 切换 360° 相机模式 */
  setCameraMode(enabled) {
    Input.useCamera = enabled;
    Input.resetCamera();
  },

  /** 重置相机到正前方 */
  resetCamera() {
    Input.cameraYaw = 0;
    Input.cameraPitch = 0;
    Input.crosshairX = Renderer.width / 2;
    Input.crosshairY = Renderer.height / 2;
  },

  /** 准星是否在屏幕中心附近命中投影点 */
  isCenterOnScreen(sx, sy, radius) {
    const cx = Renderer.width / 2;
    const cy = Renderer.height / 2;
    const dx = sx - cx;
    const dy = sy - cy;
    return dx * dx + dy * dy <= radius * radius;
  },

  /** 360° 模式：点击时检测中心准星是否命中投影目标 */
  clickHitCenter(sx, sy, radius) {
    if (!Input.justClicked) return false;
    if (!Input.isCenterOnScreen(sx, sy, radius)) return false;
    Input.consumeClick();
    return true;
  },

  /**
   * 检测准星是否在目标圆内
   * @param {number} tx - 目标中心 X
   * @param {number} ty - 目标中心 Y
   * @param {number} radius
   * @returns {boolean}
   */
  isOnTarget(tx, ty, radius) {
    const dx = Input.crosshairX - tx;
    const dy = Input.crosshairY - ty;
    return dx * dx + dy * dy <= radius * radius;
  },

  /**
   * 检测点击是否命中目标
   * @param {number} tx
   * @param {number} ty
   * @param {number} radius
   * @returns {boolean}
   */
  clickHit(tx, ty, radius) {
    if (!Input.justClicked) return false;
    if (!Input.isOnTarget(tx, ty, radius)) return false;
    Input.consumeClick();
    return true;
  },

  /** @returns {number} 准星到目标中心的距离 */
  distanceTo(tx, ty) {
    const dx = Input.crosshairX - tx;
    const dy = Input.crosshairY - ty;
    return Math.sqrt(dx * dx + dy * dy);
  },
};

// ─── Audio: Web Audio 音效 ──────────────────────────────────────────────────
const Audio = {
  /** @type {AudioContext|null} */
  ctx: null,

  init() {
    if (!State.settings.audioEnabled) return;
    Audio.ctx = Audio.ctx || new (window.AudioContext || window.webkitAudioContext)();
  },

  /**
   * 播放短促音
   * @param {number} freq
   * @param {number} duration
   * @param {'sine'|'square'} type
   * @param {number} gain
   */
  playTone(freq, duration, type = 'sine', gain = 0.15) {
    if (!State.settings.audioEnabled) return;
    Audio.init();
    if (!Audio.ctx) return;
    const t = Audio.ctx.currentTime;
    const osc = Audio.ctx.createOscillator();
    const g = Audio.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(g);
    g.connect(Audio.ctx.destination);
    osc.start(t);
    osc.stop(t + duration);
  },

  playHit() { Audio.playTone(880, 0.04, 'square', 0.12); },
  playMiss() { Audio.playTone(180, 0.08, 'sine', 0.08); },
  playTick() { Audio.playTone(660, 0.06, 'sine', 0.1); },
};

// ─── 对象池：减少 GC ─────────────────────────────────────────────────────────
const Pool = {
  /** @type {Array<{x:number,y:number,vx:number,vy:number,life:number}>} */
  particles: [],
  poolIndex: 0,

  /**
   * 生成击中粒子（预分配复用）
   * @param {number} x
   * @param {number} y
   * @returns {Array}
   */
  spawnHitParticles(x, y) {
    const result = [];
    const count = 10;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const speed = 80 + Math.random() * 120;
      let p = Pool.particles[Pool.poolIndex];
      if (!p) { p = {}; Pool.particles[Pool.poolIndex] = p; }
      p.x = x; p.y = y;
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      p.life = 1;
      result.push(p);
      Pool.poolIndex = (Pool.poolIndex + 1) % 200;
    }
    return result;
  },
};

// ─── 通用目标动画辅助 ─────────────────────────────────────────────────────────
const TargetAnim = {
  /**
   * 弹出缩放：0→1，100ms ease-out
   * @param {number} age - 目标存活时间（秒）
   * @returns {number} 0-1
   */
  popScale(age) {
    const t = Math.min(age / 0.1, 1);
    return 1 - Math.pow(1 - t, 3);
  },

  /**
   * @param {Array} particles
   * @param {number} dt
   */
  updateParticles(particles, dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 2.5;
      if (p.life <= 0) particles.splice(i, 1);
    }
  },
};

// ─── HumanoidTarget: 人形靶子绘制与命中区域判定 ──────────────────────────────
const HumanoidTarget = {
  MULTIPLIERS: { head: 2, body: 1, limb: 0.4 },

  /**
   * 绘制人形靶子
   * @param {number} x - 中心X
   * @param {number} y - 中心Y
   * @param {number} size - 整体尺寸（直径）
   * @param {number} [alpha=1]
   * @param {number} [scale=1]
   * @param {string} [color]
   * @param {string} [flashZone] - 高亮区域 'head'|'body'|'limb'
   */
  draw(x, y, size, alpha = 1, scale = 1, color = TARGET_COLOR, flashZone = null) {
    const { ctx } = Renderer;
    const s = size * scale;
    const hx = (dx) => x + dx * s;
    const hy = (dy) => y + dy * s;
    ctx.save();
    ctx.globalAlpha = alpha;

    const drawPart = (zone, fn) => {
      ctx.save();
      if (flashZone === zone) {
        ctx.fillStyle = HIT_COLOR;
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      } else {
        ctx.fillStyle = color;
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      }
      fn();
      ctx.restore();
    };

    // 头
    drawPart('head', () => {
      ctx.beginPath();
      ctx.arc(hx(0), hy(-0.48), s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    });

    // 身体
    drawPart('body', () => {
      const bw = s * 0.22, bh = s * 0.38;
      const bx = hx(0) - bw / 2, by = hy(-0.17);
      ctx.beginPath();
      ctx.moveTo(bx + bw * 0.2, by);
      ctx.lineTo(bx + bw * 0.8, by);
      ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + bh * 0.1);
      ctx.lineTo(bx + bw, by + bh * 0.9);
      ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw * 0.5, by + bh);
      ctx.lineTo(bx, by + bh);
      ctx.quadraticCurveTo(bx - bw * 0.1, by + bh * 0.9, bx, by + bh * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });

    // 四肢
    drawPart('limb', () => {
      ctx.lineWidth = s * 0.06;
      ctx.lineCap = 'round';
      // 左臂
      ctx.beginPath();
      ctx.moveTo(hx(-0.11), hy(-0.15));
      ctx.lineTo(hx(-0.35), hy(-0.45 + Math.sin(Date.now() * 0.001) * 0.02));
      ctx.stroke();
      // 右臂
      ctx.beginPath();
      ctx.moveTo(hx(0.11), hy(-0.15));
      ctx.lineTo(hx(0.35), hy(-0.45 + Math.cos(Date.now() * 0.001) * 0.02));
      ctx.stroke();
      // 左腿
      ctx.beginPath();
      ctx.moveTo(hx(-0.07), hy(0.20));
      ctx.lineTo(hx(-0.12), hy(0.50));
      ctx.stroke();
      // 右腿
      ctx.beginPath();
      ctx.moveTo(hx(0.07), hy(0.20));
      ctx.lineTo(hx(0.12), hy(0.50));
      ctx.stroke();
    });

    ctx.restore();
  },

  /**
   * 命中判定 — 返回区域名或 null
   * @param {number} x - 靶子中心X
   * @param {number} y - 靶子中心Y
   * @param {number} size - 整体尺寸
   * @param {number} px - 点击X
   * @param {number} py - 点击Y
   * @returns {string|null}
   */
  getZone(x, y, size, px, py) {
    const dx = px - x;
    const dy = py - y;
    const hd = Math.hypot(dx, dy - size * 0.48);
    if (hd <= size * 0.15) return 'head';
    const bw = size * 0.22, bh = size * 0.38;
    const bx = -bw / 2, by = -size * 0.17;
    if (dx >= bx && dx <= bx + bw && dy >= by && dy <= by + bh) return 'body';
    // 四肢粗略判定：外接矩形
    const limbDist = (lx, ly, lx2, ly2) => {
      const ldx = lx2 - lx, ldy = ly2 - ly;
      const len2 = ldx * ldx + ldy * ldy;
      let t = ((dx - lx) * ldx + (dy - ly) * ldy) / len2;
      t = Math.max(0, Math.min(1, t));
      const cx = lx + t * ldx, cy = ly + t * ldy;
      return Math.hypot(dx - cx, dy - cy);
    };
    const lw = size * 0.07;
    if (limbDist(-size * 0.11, -size * 0.15, -size * 0.35, -size * 0.45) <= lw) return 'limb';
    if (limbDist(size * 0.11, -size * 0.15, size * 0.35, -size * 0.45) <= lw) return 'limb';
    if (limbDist(-size * 0.07, size * 0.20, -size * 0.12, size * 0.50) <= lw) return 'limb';
    if (limbDist(size * 0.07, size * 0.20, size * 0.12, size * 0.50) <= lw) return 'limb';
    return null;
  },
};

// ─── GameModes ──────────────────────────────────────────────────────────────
const GameModes = {

  /** 共享：注册击中/失误，humanoid 模式下按部位加权 */
  _registerHit(session, ttc, zone) {
    session.hits++;
    session.streak++;
    session.maxStreak = Math.max(session.maxStreak, session.streak);
    session.shots.push({ type: 'hit', time: ttc, timestamp: performance.now(), zone });
    session.ttcSum += ttc;
    session.ttcCount++;
    State.shakeTimer = State.settings.screenShake ? 0.15 : 0;
    Audio.playHit();
    if (zone) {
      if (!session.zoneHits) session.zoneHits = { head: 0, body: 0, limb: 0 };
      if (session.zoneHits[zone] !== undefined) session.zoneHits[zone]++;
    }
  },

  _registerMiss(session) {
    session.misses++;
    session.streak = 0;
    session.shots.push({ type: 'miss', timestamp: performance.now() });
    Audio.playMiss();
  },

  // ── A. 网格射击 Grid Shot ────────────────────────────────────────────────
  gridShot: {
    /** @type {object|null} */
    data: null,

    onStart() {
      const p = State.modeParams;
      Input.resetCamera();
      const cols = p.gridSize;
      const rows = p.gridSize;
      const cellW = Renderer.width / cols;
      const cellH = Renderer.height / rows;
      const maxSim = Math.min(12, cols * rows);
      GameModes.gridShot.data = {
        cols, rows, cellW, cellH,
        targetRadius: p.targetSize / 2,
        totalTargets: p.totalTargets,
        simultaneous: Math.min(Math.max(1, p.simultaneousCount), maxSim),
        clusterRadius: p.clusterRadius || 3,
        recentCells: [],
        recentCooldown: 4500,
        recentBlockRadius: 2,
        spawned: 0,
        hits: 0,
        active: [],
        clusterCenter: null,
        spawnTimer: 0,
        spawnDelay: p.spawnInterval / 1000,
        particles: [],
        missFlash: 0,
      };
      State.session.remaining = p.totalTargets;
      GameModes.gridShot._fillActive();
    },

    /** 记录近期被击中的格子，短期内禁止在同位置补位 */
    _recordHitCell(col, row) {
      const d = GameModes.gridShot.data;
      const now = performance.now();
      const until = now + d.recentCooldown;
      for (let dc = -d.recentBlockRadius; dc <= d.recentBlockRadius; dc++) {
        for (let dr = -d.recentBlockRadius; dr <= d.recentBlockRadius; dr++) {
          const c = col + dc;
          const r = row + dr;
          if (c >= 0 && c < d.cols && r >= 0 && r < d.rows) {
            d.recentCells.push({ col: c, row: r, until });
          }
        }
      }
      GameModes.gridShot._pruneRecentCells();
    },

    _pruneRecentCells() {
      const d = GameModes.gridShot.data;
      const now = performance.now();
      d.recentCells = d.recentCells.filter((c) => c.until > now);
    },

    _isCellBlocked(col, row) {
      GameModes.gridShot._pruneRecentCells();
      const d = GameModes.gridShot.data;
      return d.recentCells.some((c) => c.col === col && c.row === row);
    },

    /** 获取某格周围聚集区内的空闲格（切比雪夫距离） */
    _cellsNearCluster(active, centerCol, centerRow, radius, excludeBlocked = true) {
      const d = GameModes.gridShot.data;
      const occupied = new Set(active.map(t => `${t.col},${t.row}`));
      const cells = [];
      for (let c = 0; c < d.cols; c++) {
        for (let r = 0; r < d.rows; r++) {
          if (occupied.has(`${c},${r}`)) continue;
          if (excludeBlocked && GameModes.gridShot._isCellBlocked(c, r)) continue;
          const dist = Math.max(Math.abs(c - centerCol), Math.abs(r - centerRow));
          if (dist <= radius) cells.push({ col: c, row: r, dist });
        }
      }
      cells.sort((a, b) => a.dist - b.dist);
      return cells;
    },

    /** 选取新的聚集中心（留边距保证簇完整） */
    _pickClusterCenter() {
      const d = GameModes.gridShot.data;
      const pad = d.clusterRadius;
      const minC = pad;
      const maxC = d.cols - 1 - pad;
      const minR = pad;
      const maxR = d.rows - 1 - pad;
      if (minC > maxC || minR > maxR) {
        return {
          col: Math.floor(Math.random() * d.cols),
          row: Math.floor(Math.random() * d.rows),
        };
      }
      return {
        col: minC + Math.floor(Math.random() * (maxC - minC + 1)),
        row: minR + Math.floor(Math.random() * (maxR - minR + 1)),
      };
    },

    /** 由网格格创建目标（含 360° 世界坐标） */
    _makeTarget(cell, id) {
      const d = GameModes.gridShot.data;
      const w = Mode360.cellToWorld(cell.col, cell.row, d.cols, d.rows);
      return {
        id,
        col: cell.col,
        row: cell.row,
        yaw: w.yaw,
        pitch: w.pitch,
        x: (cell.col + 0.5) * d.cellW,
        y: (cell.row + 0.5) * d.cellH,
        age: 0,
        spawnTime: performance.now(),
      };
    },

    /** @returns {{x:number,y:number,visible:boolean}} */
    _targetScreen(t) {
      if (Mode360.enabled()) return Mode360.project(t.yaw, t.pitch);
      return { x: t.x, y: t.y, visible: true };
    },

    _clickTarget(t, radius) {
      if (Mode360.enabled()) {
        const p = Mode360.project(t.yaw, t.pitch);
        if (!Input.justClicked || !Input.isCenterOnScreen(p.x, p.y, radius)) return false;
        Input.consumeClick();
        if (State.modeParams.humanoid) {
          const zone = HumanoidTarget.getZone(p.x, p.y, radius * 2, Renderer.width / 2, Renderer.height / 2);
          return { hit: true, zone };
        }
        return { hit: true };
      }
      if (!Input.justClicked || !Input.isOnTarget(t.x, t.y, radius)) return false;
      Input.consumeClick();
      if (State.modeParams.humanoid) {
        const zone = HumanoidTarget.getZone(t.x, t.y, radius * 2, Input.crosshairX, Input.crosshairY);
        return { hit: true, zone };
      }
      return { hit: true };
    },

    /** 补满同屏目标 — 同一批目标聚集在相邻网格 */
    _fillActive() {
      const d = GameModes.gridShot.data;
      const need = Math.min(d.simultaneous, d.totalTargets - d.spawned);
      if (need <= 0) return;

      if (!d.clusterCenter || d.active.length === 0) {
        d.clusterCenter = GameModes.gridShot._pickClusterCenter();
      }

      let cells = GameModes.gridShot._cellsNearCluster(
        d.active, d.clusterCenter.col, d.clusterCenter.row, d.clusterRadius
      );

      if (cells.length < need) {
        d.clusterCenter = GameModes.gridShot._pickClusterCenter();
        cells = GameModes.gridShot._cellsNearCluster(
          d.active, d.clusterCenter.col, d.clusterCenter.row, d.clusterRadius
        );
      }

      for (let i = 0; i < need && i < cells.length && d.spawned < d.totalTargets; i++) {
        d.active.push(GameModes.gridShot._makeTarget(cells[i], d.spawned));
        d.spawned++;
      }
    },

    /** 单目标消灭后在聚集区补位，避开刚被击中的格子 */
    _spawnOneInCluster(avoidCol, avoidRow) {
      const d = GameModes.gridShot.data;
      if (d.spawned >= d.totalTargets || d.active.length >= d.simultaneous) return;
      if (!d.clusterCenter) d.clusterCenter = GameModes.gridShot._pickClusterCenter();

      let cells = GameModes.gridShot._cellsNearCluster(
        d.active, d.clusterCenter.col, d.clusterCenter.row, d.clusterRadius, true
      );

      if (avoidCol !== undefined && avoidRow !== undefined) {
        cells = cells.filter((c) => !(c.col === avoidCol && c.row === avoidRow));
      }

      if (!cells.length) {
        cells = GameModes.gridShot._cellsNearCluster(
          d.active, d.clusterCenter.col, d.clusterCenter.row, d.clusterRadius + 2, true
        );
        if (avoidCol !== undefined && avoidRow !== undefined) {
          cells = cells.filter((c) => !(c.col === avoidCol && c.row === avoidRow));
        }
      }

      if (!cells.length) {
        d.clusterCenter = GameModes.gridShot._pickClusterCenter();
        cells = GameModes.gridShot._cellsNearCluster(
          d.active, d.clusterCenter.col, d.clusterCenter.row, d.clusterRadius, true
        );
      }

      if (!cells.length) return;

      if (avoidCol !== undefined && avoidRow !== undefined) {
        cells.sort((a, b) => {
          const da = Math.max(Math.abs(a.col - avoidCol), Math.abs(a.row - avoidRow));
          const db = Math.max(Math.abs(b.col - avoidCol), Math.abs(b.row - avoidRow));
          return db - da;
        });
      }

      const pool = cells.slice(0, Math.min(8, cells.length));
      const cell = pool[Math.floor(Math.random() * pool.length)];
      d.active.push(GameModes.gridShot._makeTarget(cell, d.spawned));
      d.spawned++;
    },

    update(dt) {
      const d = GameModes.gridShot.data;
      const session = State.session;

      TargetAnim.updateParticles(d.particles, dt);
      if (d.missFlash > 0) d.missFlash -= dt;

      if (d.hits >= d.totalTargets) {
        Engine.endTraining();
        return;
      }

      for (let i = d.active.length - 1; i >= 0; i--) {
        const t = d.active[i];
        t.age += dt;

        const clickResult = GameModes.gridShot._clickTarget(t, d.targetRadius);
        if (clickResult) {
          const ttc = performance.now() - t.spawnTime;
          const hitCol = t.col;
          const hitRow = t.row;
          const p = GameModes.gridShot._targetScreen(t);
          const zone = clickResult.zone || null;
          GameModes._registerHit(session, ttc, zone);
          d.particles.push(...Pool.spawnHitParticles(p.x, p.y));
          d.hits++;
          d.active.splice(i, 1);
          session.remaining = d.totalTargets - d.hits;
          const mult = zone ? (HumanoidTarget.MULTIPLIERS[zone] || 1) : 1;
          session.score += Math.round((Math.max(100, Math.round(500 - ttc * 0.5))) * mult);
          GameModes.gridShot._recordHitCell(hitCol, hitRow);
          GameModes.gridShot._spawnOneInCluster(hitCol, hitRow);
          return;
        }

        if (State.modeParams.timeLimit > 0 && t.age > State.modeParams.timeLimit / 1000) {
          GameModes._registerMiss(session);
          GameModes.gridShot._recordHitCell(t.col, t.row);
          d.active.splice(i, 1);
          GameModes.gridShot._spawnOneInCluster(t.col, t.row);
        }
      }

      if (Input.consumeClick()) {
        GameModes._registerMiss(session);
        d.missFlash = 0.2;
      }

      if (d.active.length === 0 && d.spawned >= d.totalTargets && d.hits >= d.totalTargets) {
        Engine.endTraining();
      } else if (d.active.length === 0) {
        d.clusterCenter = null;
        d.spawnTimer -= dt;
        if (d.spawnTimer <= 0) GameModes.gridShot._fillActive();
      }
    },

    render() {
      const d = GameModes.gridShot.data;
      const shake = Renderer.getShakeOffset();
      Renderer.ctx.save();
      Renderer.ctx.translate(shake.x, shake.y);

      if (Mode360.enabled()) {
        Mode360.drawBackground(0);
      } else {
        Renderer.ctx.strokeStyle = 'rgba(255,255,255,0.025)';
        Renderer.ctx.lineWidth = 1;
        const step = d.cols > 20 ? 4 : 1;
        for (let c = step; c < d.cols; c += step) {
          Renderer.ctx.globalAlpha = c % (step * 5) === 0 ? 0.08 : 0.04;
          Renderer.ctx.beginPath();
          Renderer.ctx.moveTo(c * d.cellW, 0);
          Renderer.ctx.lineTo(c * d.cellW, Renderer.height);
          Renderer.ctx.stroke();
        }
        for (let r = step; r < d.rows; r += step) {
          Renderer.ctx.globalAlpha = r % (step * 5) === 0 ? 0.08 : 0.04;
          Renderer.ctx.beginPath();
          Renderer.ctx.moveTo(0, r * d.cellH);
          Renderer.ctx.lineTo(Renderer.width, r * d.cellH);
          Renderer.ctx.stroke();
        }
        Renderer.ctx.globalAlpha = 1;

        if (d.clusterCenter && d.active.length > 0) {
          const cx = (d.clusterCenter.col + 0.5) * d.cellW;
          const cy = (d.clusterCenter.row + 0.5) * d.cellH;
          const cr = d.clusterRadius * Math.max(d.cellW, d.cellH);
          Renderer.ctx.strokeStyle = 'rgba(0,255,136,0.08)';
          Renderer.ctx.setLineDash([4, 6]);
          Renderer.ctx.beginPath();
          Renderer.ctx.arc(cx, cy, cr, 0, Math.PI * 2);
          Renderer.ctx.stroke();
          Renderer.ctx.setLineDash([]);
        }
      }

      for (const t of d.active) {
        const scale = TargetAnim.popScale(t.age);
        const p = GameModes.gridShot._targetScreen(t);
        if (Mode360.enabled() && !p.visible) {
          Mode360.drawOffscreenIndicator(p);
          continue;
        }
        if (State.modeParams.humanoid) {
          HumanoidTarget.draw(p.x, p.y, d.targetRadius * 2, 1, scale);
        } else {
          Renderer.drawTarget(p.x, p.y, d.targetRadius, 1, scale);
        }
      }
      Renderer.drawParticles(d.particles);

      if (d.missFlash > 0) {
        Renderer.ctx.fillStyle = `rgba(255,68,68,${d.missFlash * 0.3})`;
        Renderer.ctx.fillRect(0, 0, Renderer.width, Renderer.height);
      }
      Renderer.ctx.restore();
    },
  },

  // ── B. 追踪训练 Tracking（360° 视角）────────────────────────────────────
  tracking: {
    data: null,

    onStart() {
      const p = State.modeParams;
      Input.resetCamera();
      GameModes.tracking.data = {
        radius: p.targetSize / 2,
        speed: p.speed,
        path: p.pathType,
        time: 0,
        duration: p.duration,
        onTargetTime: 0,
        distanceSum: 0,
        sampleCount: 0,
        phase: Math.random() * Math.PI * 2,
        targetYaw: 0.3,
        targetPitch: 0.15,
        sx: Renderer.width / 2,
        sy: Renderer.height / 2,
      };
      State.session.remaining = p.duration;
    },

    /** 2D 屏幕路径（360° 关闭时） */
    _updateScreenTarget(d) {
      const w = Renderer.width;
      const h = Renderer.height;
      const margin = 80;
      const cx = w / 2;
      const cy = h / 2;
      const ampX = (w - margin * 2) / 2;
      const ampY = (h - margin * 2) / 2;
      const t = d.time;
      const spd = d.speed / 420;
      const omegaX = spd / Math.max(ampX, 1);
      const omegaY = spd / Math.max(ampY, 1);
      const radius = Math.min(ampX, ampY) * 0.75;
      const omegaC = spd / Math.max(radius, 1);

      switch (d.path) {
        case 'horizontal':
          d.sx = cx + Math.sin(omegaX * t + d.phase) * ampX;
          d.sy = cy;
          break;
        case 'vertical':
          d.sx = cx;
          d.sy = cy + Math.sin(omegaY * t + d.phase) * ampY;
          break;
        case 'circle':
          d.sx = cx + Math.cos(omegaC * t + d.phase) * radius;
          d.sy = cy + Math.sin(omegaC * t + d.phase) * radius;
          break;
        case 'figure8':
          d.sx = cx + Math.sin(omegaX * t + d.phase) * ampX * 0.65;
          d.sy = cy + Math.sin(omegaX * 2 * t + d.phase) * ampY * 0.45;
          break;
        case 'random': {
          const o = spd * 0.35;
          d.sx = cx + (Math.sin(o * t + d.phase) * 0.55 + Math.sin(o * 1.61 * t + 1.7) * 0.28) * ampX;
          d.sy = cy + (Math.sin(o * 1.29 * t + 2.3) * 0.55 + Math.sin(o * 1.93 * t + 0.5) * 0.28) * ampY;
          break;
        }
        case 'sCurve': {
          const o = spd * 0.5;
          d.sx = cx + Math.sin(o * t + d.phase) * ampX * 0.7;
          d.sy = cy + (Math.sin(o * 2.3 * t + d.phase * 1.4) * 0.5 + Math.sin(o * 1.7 * t + d.phase * 0.6) * 0.3) * ampY * 0.65;
          break;
        }
      }
    },

    /**
     * 在世界坐标系中更新目标角度（可绕 360° 移动）
     * @param {object} d
     */
    _updateWorldTarget(d) {
      const t = d.time;
      const spd = d.speed / 420;

      switch (d.path) {
        case 'horizontal':
          d.targetYaw = Math.sin(t * spd + d.phase) * 1.8;
          d.targetPitch = 0.1;
          break;
        case 'vertical':
          d.targetYaw = 0.2;
          d.targetPitch = Math.sin(t * spd + d.phase) * 0.75;
          break;
        case 'circle':
          d.targetYaw = Math.cos(t * spd + d.phase) * 1.4;
          d.targetPitch = Math.sin(t * spd + d.phase) * 0.55;
          break;
        case 'figure8':
          d.targetYaw = Math.sin(t * spd + d.phase) * 1.6;
          d.targetPitch = Math.sin(t * spd * 2 + d.phase) * 0.45;
          break;
        case 'random': {
          const o = spd * 0.6;
          d.targetYaw = Math.sin(t * o + d.phase) * 1.2
            + Math.sin(t * o * 1.7 + 1.3) * 0.5;
          d.targetPitch = Math.sin(t * o * 1.3 + 2.1) * 0.4
            + Math.sin(t * o * 2.3 + 0.7) * 0.25;
          break;
        }
        case 'sCurve': {
          const o = spd * 0.55;
          d.targetYaw = Math.sin(t * o + d.phase) * 1.3 + Math.sin(t * o * 2.1 + d.phase * 0.8) * 0.4;
          d.targetPitch = Math.sin(t * o * 2.3 + d.phase * 1.4) * 0.5 + Math.sin(t * o * 1.7 + d.phase * 0.6) * 0.3;
          break;
        }
      }
    },

    update(dt) {
      const d = GameModes.tracking.data;
      const session = State.session;
      d.time += dt;
      session.remaining = Math.max(0, Math.ceil(d.duration - d.time));

      if (Mode360.enabled()) {
        GameModes.tracking._updateWorldTarget(d);
        const proj = Mode360.project(d.targetYaw, d.targetPitch);
        d.sx = proj.x;
        d.sy = proj.y;
      } else {
        GameModes.tracking._updateScreenTarget(d);
      }

      if (State.modeParams.enableEvasion) {
        const crossX = Mode360.enabled() ? Renderer.width / 2 : Input.crosshairX;
        const crossY = Mode360.enabled() ? Renderer.height / 2 : Input.crosshairY;

        const relX = d.sx - crossX;
        const relY = d.sy - crossY;

        if (d._evasionPrevRX === undefined) {
          d._evasionPrevRX = relX;
          d._evasionPrevRY = relY;
          d._evasionVX = 0;
          d._evasionVY = 0;
          d._evadeVelX = 0;
          d._evadeVelY = 0;
          d._trajShiftX = 0;
          d._trajShiftY = 0;
          d._evasionTimer = 0;
          d._evasionJukeTimer = 50 + Math.floor(Math.random() * 60);
          d._evasionJukeDir = 1;
          d._evasionJukeActive = 0;
        }
        d._evasionTimer++;

        // Juke system: periodically reverse evasion direction for unpredictability
        d._evasionJukeTimer--;
        if (d._evasionJukeTimer <= 0) {
          d._evasionJukeDir *= -1;
          d._evasionJukeActive = 20 + Math.floor(Math.random() * 20);
          d._evasionJukeTimer = 45 + Math.floor(Math.random() * 80);
        }
        if (d._evasionJukeActive > 0) d._evasionJukeActive--;

        const rawVX = relX - d._evasionPrevRX;
        const rawVY = relY - d._evasionPrevRY;
        d._evasionVX = d._evasionVX * 0.6 + rawVX * 0.4;
        d._evasionVY = d._evasionVY * 0.6 + rawVY * 0.4;

        const lookahead = 15;
        const predRX = relX + d._evasionVX * lookahead;
        const predRY = relY + d._evasionVY * lookahead;
        const predDist = Math.hypot(predRX, predRY);

        const closingSpeed = Math.hypot(d._evasionVX, d._evasionVY);
        const evasionRadius = d.radius * 6 + closingSpeed * 3;

        if (predDist < evasionRadius && predDist > 0.01) {
          const threat = Math.pow(1 - predDist / evasionRadius, 2);
          const desiredSpeed = threat * d.radius * 0.2;
          const ax = predRX / predDist;
          const ay = predRY / predDist;
          const jukeBoost = d._evasionJukeActive > 0 ? 2.5 : 1.0;
          const lateral = d._evasionJukeDir * (
            Math.sin(d._evasionTimer * 0.11) * 0.5 + Math.sin(d._evasionTimer * 0.17 + 1.3) * 0.35
          ) * jukeBoost;
          const ndx = ax - ay * lateral;
          const ndy = ay + ax * lateral;
          const nl = Math.hypot(ndx, ndy);
          d._evadeVelX += (ndx / nl * desiredSpeed - d._evadeVelX) * 0.3;
          d._evadeVelY += (ndy / nl * desiredSpeed - d._evadeVelY) * 0.3;
        } else {
          d._evadeVelX *= 0.88;
          d._evadeVelY *= 0.88;
        }

        // Minimum speed floor: keeps target above ~150 px/s
        const evadeSpeed = Math.hypot(d._evadeVelX, d._evadeVelY);
        const minSpeed = d.radius * 0.1;
        if (evadeSpeed < minSpeed && evadeSpeed > 0.001 && predDist < evasionRadius * 1.5) {
          d._evadeVelX = d._evadeVelX / evadeSpeed * minSpeed;
          d._evadeVelY = d._evadeVelY / evadeSpeed * minSpeed;
        }

        // Bleed evasion into permanent trajectory shift — target commits to new direction
        d._trajShiftX += d._evadeVelX * 0.3;
        d._trajShiftY += d._evadeVelY * 0.3;
        // Very slow restoration when no threat
        if (predDist >= evasionRadius * 1.2) {
          d._trajShiftX *= 0.998;
          d._trajShiftY *= 0.998;
        }

        d.sx += d._evadeVelX + d._trajShiftX;
        d.sy += d._evadeVelY + d._trajShiftY;

        d._evasionPrevRX = relX;
        d._evasionPrevRY = relY;
      }

      const tx = d.sx;
      const ty = d.sy;
      const cx = Renderer.width / 2;
      const cy = Renderer.height / 2;
      const dist = Math.hypot(
        tx - (Mode360.enabled() ? cx : Input.crosshairX),
        ty - (Mode360.enabled() ? cy : Input.crosshairY)
      );
      d.distanceSum += dist;
      d.sampleCount++;

      const tracking = Mode360.enabled()
        ? Input.isCenterOnScreen(tx, ty, d.radius)
        : Input.isOnTarget(tx, ty, d.radius);
      if (tracking) {
        d.onTargetTime += dt;
        session.streak += dt;
      } else {
        session.streak = 0;
      }

      const avgDist = d.distanceSum / Math.max(d.sampleCount, 1);
      session.trackingCoverage = (d.onTargetTime / d.duration) * 100;
      session.avgDistance = avgDist;
      session.hits = Math.floor(d.onTargetTime * 10);
      session.score = Math.round(
        session.trackingCoverage * 80
        + Math.max(0, 2000 - avgDist * 8)
        + session.streak * 2
      );

      if (d.time >= d.duration) {
        session.trackingCoverage = (d.onTargetTime / d.duration) * 100;
        session.avgDistance = avgDist;
        session.accuracy = session.trackingCoverage;
        Engine.endTraining();
      }
    },

    render() {
      const d = GameModes.tracking.data;
      if (Mode360.enabled()) {
        Mode360.drawBackground(d.time);
      }

      const tx = d.sx;
      const ty = d.sy;
      const onTarget = Mode360.enabled()
        ? Input.isCenterOnScreen(tx, ty, d.radius)
        : Input.isOnTarget(tx, ty, d.radius);
      const { ctx } = Renderer;
      const proj360 = Mode360.enabled() ? Mode360.project(d.targetYaw, d.targetPitch) : null;

      if (onTarget) {
        ctx.save();
        ctx.strokeStyle = 'rgba(0,255,136,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(tx, ty, d.radius + 8, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      if (!Mode360.enabled() || proj360.visible) {
        if (State.modeParams.humanoid) {
          HumanoidTarget.draw(tx, ty, d.radius * 2, 1, 1, onTarget ? HIT_COLOR : TARGET_COLOR);
        } else {
          Renderer.drawTarget(tx, ty, d.radius, 1, 1, onTarget ? HIT_COLOR : TARGET_COLOR);
        }
      } else if (proj360) {
        Mode360.drawOffscreenIndicator(proj360);
      }
    },
  },

  // ── C. 反应测试 Reaction ─────────────────────────────────────────────────
  reaction: {
    data: null,

    onStart() {
      const p = State.modeParams;
      Input.resetCamera();
      GameModes.reaction.data = {
        total: p.totalTrials,
        current: 0,
        phase: 'waiting', // waiting | ready | result
        waitTimer: 1 + Math.random() * (p.prepTimeMax - p.prepTimeMin) + p.prepTimeMin,
        appearTime: 0,
        timeout: p.targetTimeout / 1000,
        radius: p.targetSize / 2,
        tx: 0, ty: 0,
        tyaw: 0, tpitch: 0,
        reactionTimes: [],
        falseStarts: 0,
        particles: [],
      };
      State.session.remaining = p.totalTrials;
    },

    _randomTarget() {
      if (Mode360.enabled()) {
        const w = Mode360.randomWorld();
        return { tx: 0, ty: 0, tyaw: w.yaw, tpitch: w.pitch };
      }
      const pad = GameModes.reaction.data.radius + 40;
      return {
        tx: pad + Math.random() * (Renderer.width - pad * 2),
        ty: pad + Math.random() * (Renderer.height - pad * 2),
        tyaw: 0, tpitch: 0,
      };
    },

    _targetScreen(d) {
      if (Mode360.enabled()) return Mode360.project(d.tyaw, d.tpitch);
      return { x: d.tx, y: d.ty, visible: true };
    },

    _clickTarget(d) {
      const p = GameModes.reaction._targetScreen(d);
      if (Mode360.enabled()) {
        if (!Input.justClicked || !Input.isCenterOnScreen(p.x, p.y, d.radius)) return false;
        Input.consumeClick();
        if (State.modeParams.humanoid) {
          const zone = HumanoidTarget.getZone(p.x, p.y, d.radius * 2, Renderer.width / 2, Renderer.height / 2);
          return { hit: true, zone };
        }
        return { hit: true };
      }
      if (!Input.justClicked || !Input.isOnTarget(d.tx, d.ty, d.radius)) return false;
      Input.consumeClick();
      if (State.modeParams.humanoid) {
        const zone = HumanoidTarget.getZone(d.tx, d.ty, d.radius * 2, Input.crosshairX, Input.crosshairY);
        return { hit: true, zone };
      }
      return { hit: true };
    },

    update(dt) {
      const d = GameModes.reaction.data;
      const session = State.session;

      if (d.phase === 'waiting') {
        d.waitTimer -= dt;
        if (Input.consumeClick()) {
          d.falseStarts++;
          GameModes._registerMiss(session);
          d.waitTimer = 1 + Math.random() * 3 + State.modeParams.prepTimeMin;
        }
        if (d.waitTimer <= 0) {
          d.phase = 'ready';
          const pos = GameModes.reaction._randomTarget();
          d.tx = pos.tx; d.ty = pos.ty;
          d.tyaw = pos.tyaw; d.tpitch = pos.tpitch;
          d.appearTime = performance.now();
        }
      } else if (d.phase === 'ready') {
        const clickResult = GameModes.reaction._clickTarget(d);
        if (clickResult) {
          const rt = performance.now() - d.appearTime;
          const p = GameModes.reaction._targetScreen(d);
          const zone = clickResult.zone || null;
          d.reactionTimes.push(rt);
          GameModes._registerHit(session, rt, zone);
          d.particles.push(...Pool.spawnHitParticles(p.x, p.y));
          d.current++;
          session.remaining = d.total - d.current;
          const mult = zone ? (HumanoidTarget.MULTIPLIERS[zone] || 1) : 1;
          session.score += Math.round((Math.max(50, Math.round(1000 - rt))) * mult);
          d.phase = 'waiting';
          d.waitTimer = 1 + Math.random() * 3 + State.modeParams.prepTimeMin;
          if (d.current >= d.total) {
            session.reactionTimes = [...d.reactionTimes];
            Engine.endTraining();
          }
        } else if (performance.now() - d.appearTime > d.timeout * 1000) {
          GameModes._registerMiss(session);
          d.current++;
          session.remaining = d.total - d.current;
          d.phase = 'waiting';
          d.waitTimer = 1 + Math.random() * 3 + State.modeParams.prepTimeMin;
          if (d.current >= d.total) {
            session.reactionTimes = [...d.reactionTimes];
            Engine.endTraining();
          }
        }
      }
      TargetAnim.updateParticles(d.particles, dt);
    },

    render() {
      const d = GameModes.reaction.data;
      const shake = Renderer.getShakeOffset();
      Renderer.ctx.save();
      Renderer.ctx.translate(shake.x, shake.y);

      if (Mode360.enabled()) Mode360.drawBackground(0);

      if (d.phase === 'waiting') {
        Renderer.ctx.fillStyle = '#ff4444';
        Renderer.ctx.font = '24px Consolas, monospace';
        Renderer.ctx.textAlign = 'center';
        Renderer.ctx.fillText(State.lang === 'zh' ? '等待目标... 请勿点击' : 'Wait... Don\'t click', Renderer.width / 2, Renderer.height / 2);
      } else if (d.phase === 'ready') {
        const p = GameModes.reaction._targetScreen(d);
        if (Mode360.enabled() && !p.visible) Mode360.drawOffscreenIndicator(p);
        else if (State.modeParams.humanoid) HumanoidTarget.draw(p.x, p.y, d.radius * 2, 1, 1);
        else Renderer.drawTarget(p.x, p.y, d.radius, 1, 1);
      }
      Renderer.drawParticles(d.particles);
      Renderer.ctx.restore();
    },
  },

  // ── D. 扫射转移 — 按住跟踪移动球体 ───────────────────────────────────────
  flickShot: {
    data: null,

    onStart() {
      const p = State.modeParams;
      Input.resetCamera();
      GameModes.flickShot.data = {
        radius: p.targetSize / 2,
        total: p.totalRounds,
        current: 0,
        speed: p.speed,
        path: p.pathType,
        holdRequired: p.trackDuration,
        holdTime: 0,
        ball: null,
        time: 0,
        phase: Math.random() * Math.PI * 2,
        particles: [],
        trail: [],
      };
      State.session.remaining = p.totalRounds;
      GameModes.flickShot._spawnBall();
    },

    /** 在新位置生成沿轨迹移动的球 */
    _spawnBall() {
      const d = GameModes.flickShot.data;
      d.time = 0;
      d.holdTime = 0;

      if (Mode360.enabled()) {
        let yaw, pitch, attempts = 0;
        do {
          const w = Mode360.randomWorld();
          yaw = w.yaw;
          pitch = w.pitch;
          attempts++;
        } while (
          d.ball
          && World3D.angularDistance(yaw, pitch, d.ball.originYaw, d.ball.originPitch) < 0.75
          && attempts < 30
        );
        d.ball = {
          originYaw: yaw,
          originPitch: pitch,
          yaw,
          pitch,
          x: Renderer.width / 2,
          y: Renderer.height / 2,
          age: 0,
          startTime: performance.now(),
        };
      } else {
        const pad = 100;
        const w = Renderer.width;
        const h = Renderer.height;
        let x, y, attempts = 0;

        do {
          x = pad + Math.random() * (w - pad * 2);
          y = pad + Math.random() * (h - pad * 2);
          attempts++;
        } while (
          d.ball
          && Math.hypot(x - d.ball.originX, y - d.ball.originY) < 220
          && attempts < 30
        );

        d.ball = {
          originX: x,
          originY: y,
          x,
          y,
          age: 0,
          startTime: performance.now(),
        };
      }
      d.trail = [];
    },

    /** 360° 模式下球体世界角轨迹 */
    _ballWorldPosition(d) {
      const t = d.time;
      const spd = d.speed / 420;
      const oy = d.ball.originYaw;
      const op = d.ball.originPitch;
      const amp = 0.28 + d.radius * 0.008;

      switch (d.path) {
        case 'horizontal':
          return { yaw: oy + Math.sin(t * spd + d.phase) * amp * 1.6, pitch: op };
        case 'vertical':
          return { yaw: oy, pitch: op + Math.sin(t * spd + d.phase) * amp * 1.2 };
        case 'circle':
          return {
            yaw: oy + Math.cos(t * spd + d.phase) * amp,
            pitch: op + Math.sin(t * spd + d.phase) * amp * 0.75,
          };
        case 'figure8':
          return {
            yaw: oy + Math.sin(t * spd + d.phase) * amp,
            pitch: op + Math.sin(t * spd * 2 + d.phase) * amp * 0.55,
          };
        case 'random': {
          const o = spd * 0.55;
          return {
            yaw: oy + Math.sin(t * o + d.phase) * amp
              + Math.sin(t * o * 1.9 + 1.2) * amp * 0.35,
            pitch: op + Math.sin(t * o * 1.3 + 2.0) * amp * 0.7
              + Math.sin(t * o * 2.4 + 0.5) * amp * 0.25,
          };
        }
        case 'sCurve': {
          const o = spd * 0.55;
          return {
            yaw: oy + Math.sin(t * o + d.phase) * amp * 1.3 + Math.sin(t * o * 2.1 + d.phase * 0.8) * amp * 0.4,
            pitch: op + Math.sin(t * o * 2.3 + d.phase * 1.4) * amp * 0.5 + Math.sin(t * o * 1.7 + d.phase * 0.6) * amp * 0.3,
          };
        }
        default:
          return { yaw: oy, pitch: op };
      }
    },

    /**
     * 计算球体当前位置（2D 或世界角）
     * @param {object} d
     * @returns {{x:number,y:number}|{yaw:number,pitch:number}}
     */
    _ballPosition(d) {
      if (Mode360.enabled()) return GameModes.flickShot._ballWorldPosition(d);
      const t = d.time;
      const spd = d.speed / 400;
      const ox = d.ball.originX;
      const oy = d.ball.originY;
      const amp = 70 + d.radius;

      switch (d.path) {
        case 'horizontal':
          return { x: ox + Math.sin(t * spd + d.phase) * amp * 1.6, y: oy };
        case 'vertical':
          return { x: ox, y: oy + Math.sin(t * spd + d.phase) * amp * 1.2 };
        case 'circle':
          return {
            x: ox + Math.cos(t * spd + d.phase) * amp,
            y: oy + Math.sin(t * spd + d.phase) * amp * 0.75,
          };
        case 'figure8':
          return {
            x: ox + Math.sin(t * spd + d.phase) * amp,
            y: oy + Math.sin(t * spd * 2 + d.phase) * amp * 0.55,
          };
        case 'random': {
          const o = spd * 0.55;
          return {
            x: ox + Math.sin(t * o + d.phase) * amp
              + Math.sin(t * o * 1.9 + 1.2) * amp * 0.35,
            y: oy + Math.sin(t * o * 1.3 + 2.0) * amp * 0.7
              + Math.sin(t * o * 2.4 + 0.5) * amp * 0.25,
          };
        }
        case 'sCurve': {
          const o = spd * 0.5;
          return {
            x: ox + Math.sin(t * o + d.phase) * amp * 0.7,
            y: oy + (Math.sin(t * o * 2.3 + d.phase * 1.4) * 0.5 + Math.sin(t * o * 1.7 + d.phase * 0.6) * 0.3) * amp * 0.65,
          };
        }
        default:
          return { x: ox, y: oy };
      }
    },

    update(dt) {
      const d = GameModes.flickShot.data;
      const session = State.session;
      if (!d.ball) return;

      d.time += dt;
      d.ball.age += dt;
      TargetAnim.updateParticles(d.particles, dt);

      const pos = GameModes.flickShot._ballPosition(d);
      let onBall;
      if (Mode360.enabled()) {
        d.ball.yaw = pos.yaw;
        d.ball.pitch = pos.pitch;
        const proj = Mode360.project(pos.yaw, pos.pitch);
        d.ball.x = proj.x;
        d.ball.y = proj.y;
        d.ball.visible = proj.visible;
        onBall = proj.visible && Input.isCenterOnScreen(proj.x, proj.y, d.radius);
      } else {
        d.ball.x = Math.max(d.radius, Math.min(Renderer.width - d.radius, pos.x));
        d.ball.y = Math.max(d.radius, Math.min(Renderer.height - d.radius, pos.y));
        d.ball.visible = true;
        onBall = Input.isOnTarget(d.ball.x, d.ball.y, d.radius);
      }

      if (State.modeParams.enableEvasion) {
        const crossX = Mode360.enabled() ? Renderer.width / 2 : Input.crosshairX;
        const crossY = Mode360.enabled() ? Renderer.height / 2 : Input.crosshairY;

        const relX = d.ball.x - crossX;
        const relY = d.ball.y - crossY;

        if (d._evasionPrevRX === undefined) {
          d._evasionPrevRX = relX;
          d._evasionPrevRY = relY;
          d._evasionVX = 0;
          d._evasionVY = 0;
          d._evadeVelX = 0;
          d._evadeVelY = 0;
          d._evasionTimer = 0;
          d._evasionJukeTimer = 50 + Math.floor(Math.random() * 60);
          d._evasionJukeDir = 1;
          d._evasionJukeActive = 0;
        }
        d._evasionTimer++;

        d._evasionJukeTimer--;
        if (d._evasionJukeTimer <= 0) {
          d._evasionJukeDir *= -1;
          d._evasionJukeActive = 20 + Math.floor(Math.random() * 20);
          d._evasionJukeTimer = 45 + Math.floor(Math.random() * 80);
        }
        if (d._evasionJukeActive > 0) d._evasionJukeActive--;

        const rawVX = relX - d._evasionPrevRX;
        const rawVY = relY - d._evasionPrevRY;
        d._evasionVX = d._evasionVX * 0.6 + rawVX * 0.4;
        d._evasionVY = d._evasionVY * 0.6 + rawVY * 0.4;

        const lookahead = 15;
        const predRX = relX + d._evasionVX * lookahead;
        const predRY = relY + d._evasionVY * lookahead;
        const predDist = Math.hypot(predRX, predRY);

        const closingSpeed = Math.hypot(d._evasionVX, d._evasionVY);
        const evasionRadius = d.radius * 6 + closingSpeed * 3;

        if (predDist < evasionRadius && predDist > 0.01) {
          const threat = Math.pow(1 - predDist / evasionRadius, 2);
          const desiredSpeed = threat * d.radius * 0.2;
          const ax = predRX / predDist;
          const ay = predRY / predDist;
          const jukeBoost = d._evasionJukeActive > 0 ? 2.5 : 1.0;
          const lateral = d._evasionJukeDir * (
            Math.sin(d._evasionTimer * 0.11) * 0.5 + Math.sin(d._evasionTimer * 0.17 + 1.3) * 0.35
          ) * jukeBoost;
          const ndx = ax - ay * lateral;
          const ndy = ay + ax * lateral;
          const nl = Math.hypot(ndx, ndy);
          d._evadeVelX += (ndx / nl * desiredSpeed - d._evadeVelX) * 0.3;
          d._evadeVelY += (ndy / nl * desiredSpeed - d._evadeVelY) * 0.3;
        } else {
          d._evadeVelX *= 0.88;
          d._evadeVelY *= 0.88;
        }

        // Minimum speed floor: keeps target above ~150 px/s
        const evadeSpeed = Math.hypot(d._evadeVelX, d._evadeVelY);
        const minSpeed = d.radius * 0.1;
        if (evadeSpeed < minSpeed && evadeSpeed > 0.001 && predDist < evasionRadius * 1.5) {
          d._evadeVelX = d._evadeVelX / evadeSpeed * minSpeed;
          d._evadeVelY = d._evadeVelY / evadeSpeed * minSpeed;
        }

        // Bleed evasion into ball origin — trajectory permanently shifts
        d.ball.originX += d._evadeVelX * 0.2;
        d.ball.originY += d._evadeVelY * 0.2;

        d.ball.x = Math.max(d.radius, Math.min(Renderer.width - d.radius, d.ball.x + d._evadeVelX));
        d.ball.y = Math.max(d.radius, Math.min(Renderer.height - d.radius, d.ball.y + d._evadeVelY));
        onBall = Mode360.enabled()
          ? d.ball.visible && Input.isCenterOnScreen(d.ball.x, d.ball.y, d.radius)
          : Input.isOnTarget(d.ball.x, d.ball.y, d.radius);

        d._evasionPrevRX = relX;
        d._evasionPrevRY = relY;
      }

      d.trail.push({ x: d.ball.x, y: d.ball.y });
      if (d.trail.length > 24) d.trail.shift();

      const holding = Input.mouseDown;

      if (holding && onBall) {
        d.holdTime += dt;
        session.streak += dt;
      } else {
        session.streak = 0;
      }

      session.trackingCoverage = (d.holdTime / d.holdRequired) * 100;
      session.score += holding && onBall ? Math.round(dt * 120) : 0;

      if (d.holdTime >= d.holdRequired) {
        let zone = null;
        if (State.modeParams.humanoid) {
          const crossX = Mode360.enabled() ? Renderer.width / 2 : Input.crosshairX;
          const crossY = Mode360.enabled() ? Renderer.height / 2 : Input.crosshairY;
          zone = HumanoidTarget.getZone(d.ball.x, d.ball.y, d.radius * 2, crossX, crossY);
        }
        GameModes._registerHit(session, d.ball.age * 1000, zone);
        d.particles.push(...Pool.spawnHitParticles(d.ball.x, d.ball.y));
        d.current++;
        session.remaining = d.total - d.current;
        const mult = zone ? (HumanoidTarget.MULTIPLIERS[zone] || 1) : 1;
        session.score += Math.round(500 * mult);
        if (d.current >= d.total) {
          Engine.endTraining();
        } else {
          GameModes.flickShot._spawnBall();
        }
      } else if (d.ball.age > d.holdRequired * 3) {
        GameModes._registerMiss(session);
        d.current++;
        session.remaining = d.total - d.current;
        if (d.current >= d.total) Engine.endTraining();
        else GameModes.flickShot._spawnBall();
      }
    },

    render() {
      const d = GameModes.flickShot.data;
      if (!d.ball) return;

      const { ctx } = Renderer;
      const holding = Input.mouseDown;
      const onBall = Mode360.enabled()
        ? d.ball.visible && Input.isCenterOnScreen(d.ball.x, d.ball.y, d.radius)
        : Input.isOnTarget(d.ball.x, d.ball.y, d.radius);

      if (Mode360.enabled()) {
        Mode360.drawBackground(d.time);
      } else {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, Renderer.width, Renderer.height);
      }

      if (d.trail.length > 2) {
        ctx.strokeStyle = 'rgba(0,255,136,0.15)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(d.trail[0].x, d.trail[0].y);
        for (let i = 1; i < d.trail.length; i++) ctx.lineTo(d.trail[i].x, d.trail[i].y);
        ctx.stroke();
      }

      const progress = Math.min(d.holdTime / d.holdRequired, 1);
      if (progress > 0) {
        ctx.strokeStyle = holding && onBall ? '#00ff88' : '#ff4444';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(d.ball.x, d.ball.y, d.radius + 10, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
        ctx.stroke();
      }

      const scale = TargetAnim.popScale(Math.min(d.ball.age, 0.15));
      if (!Mode360.enabled() || d.ball.visible) {
        if (State.modeParams.humanoid) {
          HumanoidTarget.draw(
            d.ball.x, d.ball.y, d.radius * 2, 1, scale,
            holding && onBall ? HIT_COLOR : TARGET_COLOR
          );
        } else {
          Renderer.drawTarget(
            d.ball.x, d.ball.y, d.radius, 1, scale,
            holding && onBall ? HIT_COLOR : TARGET_COLOR
          );
        }
      } else if (Mode360.enabled()) {
        Mode360.drawOffscreenIndicator({ x: d.ball.x, y: d.ball.y, visible: false });
      }

      if (!holding) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '13px Consolas, monospace';
        ctx.textAlign = 'center';
        ctx.fillText(
          State.lang === 'zh' ? '按住左键跟踪球体' : 'Hold LMB to track ball',
          Renderer.width / 2, Renderer.height - 40
        );
      }

      Renderer.drawParticles(d.particles);
    },
  },
};

// ─── Stats: 统计与评级 ────────────────────────────────────────────────────────
const Stats = {
  /**
   * 创建新训练会话
   * @param {string} modeId
   * @param {object} params
   * @returns {object}
   */
  createSession(modeId, params) {
    return {
      mode: modeId,
      params,
      startTime: Date.now(),
      score: 0,
      hits: 0,
      misses: 0,
      streak: 0,
      maxStreak: 0,
      shots: [],
      ttcSum: 0,
      ttcCount: 0,
      remaining: 0,
      flickTimes: [],
      reactionTimes: [],
    };
  },

  /**
   * 结算会话数据
   * @param {object} session
   */
  finalizeSession(session) {
    session.endTime = Date.now();
    session.duration = session.endTime - session.startTime;
    session.accuracy = session.hits + session.misses > 0
      ? (session.hits / (session.hits + session.misses)) * 100 : 0;
    session.avgTtc = session.ttcCount > 0 ? session.ttcSum / session.ttcCount : 0;

  // 反应时间剔除 ±2σ 异常值
    if (session.reactionTimes && session.reactionTimes.length > 0) {
      const arr = session.reactionTimes.slice().sort((a, b) => a - b);
      const mean = arr.reduce((s, v) => s + v, 0) / arr.length;
      const std = Math.sqrt(arr.reduce((s, v) => s + (v - mean) ** 2, 0) / arr.length);
      const filtered = arr.filter(v => Math.abs(v - mean) <= 2 * std);
      session.avgReaction = filtered.length ? filtered.reduce((s, v) => s + v, 0) / filtered.length : mean;
      session.reactionStd = std;
    }

    if (session.shots.length > 1) {
      const hitTimes = session.shots.filter(s => s.type === 'hit' && s.time).map(s => s.time);
      if (hitTimes.length > 1) {
        const m = hitTimes.reduce((a, b) => a + b, 0) / hitTimes.length;
        session.ttcStd = Math.sqrt(hitTimes.reduce((s, v) => s + (v - m) ** 2, 0) / hitTimes.length);
      }
    }

    session.grade = Stats.computeGrade(session);
  },

  /**
   * 基于得分/准确度/反应时间计算评级 S/A/B/C/D
   * @param {object} session
   * @returns {string}
   */
  computeGrade(session) {
    let score = 0;
    score += Math.min(session.accuracy, 100) * 0.4;
    if (session.avgTtc > 0) score += Math.max(0, 60 - session.avgTtc / 10);
    if (session.avgReaction) score += Math.max(0, 60 - session.avgReaction / 5);
    if (session.trackingCoverage) score += session.trackingCoverage * 0.5;
    score += Math.min(session.score / 200, 40);

    if (score >= 85) return 'S';
    if (score >= 70) return 'A';
    if (score >= 55) return 'B';
    if (score >= 40) return 'C';
    return 'D';
  },
};

// ─── Storage: localStorage 持久化 ─────────────────────────────────────────────
const Storage = {
  /**
   * 加载设置与历史
   * @returns {object}
   */
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return Storage.defaultData();
  },

  defaultData() {
    return {
      settings: Storage.defaultSettings(),
      history: [],
      highScores: {},
      presets: {},
      mode360Prefs: {},
    };
  },

  /**
   * @param {string} modeId
   * @returns {boolean}
   */
  getMode360Pref(modeId) {
    const data = Storage.load();
    if (data.mode360Prefs && Object.prototype.hasOwnProperty.call(data.mode360Prefs, modeId)) {
      return !!data.mode360Prefs[modeId];
    }
    return modeId === 'tracking';
  },

  /**
   * @param {string} modeId
   * @param {boolean} val
   */
  saveMode360Pref(modeId, val) {
    const data = Storage.load();
    if (!data.mode360Prefs) data.mode360Prefs = {};
    data.mode360Prefs[modeId] = !!val;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  },

  defaultSettings() {
    return {
      sensitivity: 1.0,
      rawInput: true,
      audioEnabled: true,
      screenShake: true,
      crosshair: {
        type: 'cross',
        color: '#00ff00',
        thickness: 2,
        length: 8,
        gap: 4,
        opacity: 1,
        shootSpread: true,
      },
    };
  },

  /**
   * @param {string} modeId
   * @returns {object}
   */
  getDefaultModeParams(modeId) {
    const defaults = {
      gridShot: { gridSize: 40, targetSize: 22, totalTargets: 50, spawnInterval: 200, timeLimit: 0, simultaneousCount: 3, clusterRadius: 3, humanoid: false },
      tracking: { targetSize: 50, speed: 150, pathType: 'circle', duration: 30, humanoid: false, enableEvasion: false },
      reaction: { targetSize: 50, totalTrials: 25, prepTimeMin: 1, prepTimeMax: 4, targetTimeout: 2000, humanoid: false },
      flickShot: { targetSize: 40, totalRounds: 10, trackDuration: 3, speed: 200, pathType: 'circle', humanoid: false, enableEvasion: false },
    };
    const base = defaults[modeId] || {};
    return { ...base, enable360: Storage.getMode360Pref(modeId) };
  },

  save() {
    const data = Storage.load();
    data.settings = State.settings;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  },

  /**
   * @param {object} session
   */
  saveSession(session) {
    const data = Storage.load();
    data.history.unshift({
      mode: session.mode,
      score: session.score,
      accuracy: session.accuracy,
      avgTtc: session.avgTtc,
      avgReaction: session.avgReaction,
      grade: session.grade,
      timestamp: session.endTime,
    });
    if (data.history.length > MAX_HISTORY) data.history.length = MAX_HISTORY;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  },

  updateHighScore(mode, score) {
    const data = Storage.load();
    if (!data.highScores[mode] || score > data.highScores[mode]) {
      data.highScores[mode] = score;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
  },

  getHistory(mode) {
    return Storage.load().history.filter(h => h.mode === mode).slice(0, 10);
  },

  getHighScore(mode) {
    return Storage.load().highScores[mode] || 0;
  },
};
